<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki Движок</title>
  <link rel="icon" type="image/svg+xml" sizes="any" href="/assets/favicon.svg" />
  <script src="/vendor/react.production.min.js"></script>
  <script src="/vendor/react-dom.production.min.js"></script>
  <script src="/vendor/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F8FA;
      --surface:   #FFFFFF;
      --surface2:  #F0F1F4;
      --border:    #E5E7EB;
      --accent:    #2563EB;
      --accent2:   #4F46E5;
      --text:      #111827;
      --text-dim:  #6B7280;
      --green:     #16A34A;
      --yellow:    #D97706;
      --red:       #DC2626;
      --panel-w:   280px;
      --right-panel-w: 520px;
      --header-h:  52px;
    }

    body { background:
             radial-gradient(circle at top left, rgba(37,99,235,.08), transparent 32vw),
             linear-gradient(135deg, #F8FAFC 0%, #F3F4F6 48%, #EEF2FF 100%);
           color: var(--text);
           font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow: hidden;
           font-size: 14px; -webkit-font-smoothing: antialiased; }

    /* ── Layout ─────────────────────────────── */
    #root { display: flex; flex-direction: column; height: 100vh; }

    .header {
      height: var(--header-h); background: rgba(255,255,255,.86);
      border-bottom: 1px solid rgba(148,163,184,.32);
      display: flex; align-items: center; padding: 0 14px; gap: 10px;
      flex-shrink: 0; z-index: 10;
      box-shadow: 0 1px 10px rgba(15,23,42,.05);
      backdrop-filter: blur(14px);
    }
    .app-brand {
      display: flex; align-items: center; gap: 9px; min-width: 0;
      padding-right: 4px;
    }
    .brand-mark {
      width: 30px; height: 30px; display: grid; place-items: center;
      border-radius: 10px; color: #fff; font-weight: 800;
      background: linear-gradient(135deg, #2563EB, #0F766E);
      box-shadow: 0 8px 20px rgba(37,99,235,.22);
    }
    .brand-copy { display: flex; flex-direction: column; line-height: 1.05; }
    .brand-copy strong { font-size: 14px; letter-spacing: -.01em; }
    .brand-copy span { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; }
    .header h1 { font-size: 17px; font-weight: 700; color: var(--accent); }
    .header .spacer { flex: 1; }
    .header-actions { display: flex; align-items: center; gap: 6px; }
    .header-divider { width: 1px; height: 24px; background: var(--border); margin: 0 2px; }
    .manage-menu-wrap { position: relative; }
    .manage-menu {
      position: absolute; top: calc(100% + 8px); right: 0; min-width: 210px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 8px; z-index: 60;
      box-shadow: 0 18px 45px rgba(15,23,42,.16);
    }
    .manage-menu button {
      width: 100%; border: 0; background: transparent; border-radius: 9px;
      padding: 9px 10px; text-align: left; font-size: 13px; color: var(--text);
      cursor: pointer;
    }
    .manage-menu button:hover { background: #F8FAFC; }
    .manage-menu button.danger { color: var(--red); }
    .manage-menu .caption { padding: 4px 10px 8px; font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); margin-bottom: 4px; }
    .header-btn {
      background: rgba(248,250,252,.85); border: 1px solid var(--border);
      color: var(--text-dim); border-radius: 999px;
      padding: 7px 12px; font-size: 13px; cursor: pointer;
      transition: all .15s; font-weight: 500;
    }
    .header-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(37,99,235,.06); }
    .header-btn.primary {
      background: var(--text); border-color: var(--text); color: #fff;
      box-shadow: 0 8px 18px rgba(15,23,42,.14);
    }
    .header-btn.primary:hover { background: #0F172A; color: #fff; }
    .header-btn.subtle { background: transparent; }
    .header-btn.danger:hover { border-color: var(--red); color: var(--red); background: rgba(220,38,38,.06); }

    .main-area { display: flex; flex: 1; overflow: hidden; }

    /* ── Panels ─────────────────────────────── */
    .panel {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
      transition: width .2s ease; overflow: hidden;
      box-shadow: 1px 0 3px rgba(0,0,0,.02);
    }
    .panel.right {
      border-right: none; border-left: 1px solid rgba(148,163,184,.35);
      box-shadow: -12px 0 34px rgba(15,23,42,.08);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(14px);
    }
    .panel.collapsed { width: 0 !important; }
    .panel-header {
      padding: 14px 16px; font-size: 12px; font-weight: 600;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
      background: var(--surface);
    }
    .panel-header span { flex: 1; }
    .panel-body { flex: 1; overflow-y: auto; padding: 10px 0; }
    .panel-body::-webkit-scrollbar { width: 5px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .panel-body::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ── Sessions list ───────────────────────── */
    .session-item {
      padding: 10px 14px; cursor: pointer; border-radius: 8px; margin: 2px 8px;
      font-size: 13px; color: var(--text-dim); transition: all .1s;
      display: flex; flex-direction: column; gap: 3px;
    }
    .session-item:hover, .session-item.active { background: var(--surface2); color: var(--text); }
    .session-item.active { border-left: 3px solid var(--accent); }
    .session-item .s-title { font-size: 13px; white-space: nowrap;
                              overflow: hidden; text-overflow: ellipsis; }
    .session-item .s-meta { font-size: 11px; color: var(--text-dim); }
    .btn-new-session {
      margin: 8px; padding: 10px; border-radius: 8px;
      background: var(--accent); color: #fff; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; width: calc(100% - 16px);
      transition: opacity .15s; box-shadow: 0 1px 3px rgba(37,99,235,.2);
    }
    .btn-new-session:hover { opacity: .9; }

    /* ── Chat center ─────────────────────────── */
    .chat-area {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex;
                flex-direction: column; gap: 18px; }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .messages::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    .msg { display: flex; gap: 10px; max-width: 820px; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-bubble {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      font-size: 14px; line-height: 1.65; max-width: 680px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .msg.user .msg-bubble { background: var(--accent); border-color: var(--accent);
                              color: #fff; border-radius: 12px 4px 12px 12px; }
    .msg.assistant .msg-bubble { border-radius: 4px 12px 12px 12px; }
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble code { background: rgba(0,0,0,.06); padding: 2px 6px;
                          border-radius: 4px; font-size: 13px; color: var(--text); }
    .msg-bubble pre { background: var(--surface2); padding: 14px; border-radius: 8px;
                        overflow-x: auto; font-size: 13px; border: 1px solid var(--border); }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: 10px 0;
                         font-size: 13px; }
    .msg-bubble td, .msg-bubble th { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    .msg-bubble th { background: var(--surface2); }

    /* wikilinks in answers */
    .wikilink {
      color: var(--accent); text-decoration: none; font-weight: 500;
      padding: 1px 4px; border-radius: 4px; border-bottom: 1px solid var(--accent);
      cursor: pointer; transition: all .15s;
    }
    .wikilink:hover { background: rgba(37,99,235,.08); }

    /* provenance markers */
    .provenance { font-size: 0.75em; vertical-align: super; }
    .provenance a {
      color: var(--text-dim); text-decoration: none; border-bottom: 1px dotted var(--text-dim);
      transition: color .15s;
    }
    .provenance a:hover { color: var(--accent); border-bottom-color: var(--accent); }

    .msg-meta { font-size: 11px; color: var(--text-dim); margin-top: 8px;
                 display: flex; gap: 6px; flex-wrap: wrap; }
    .msg-meta .tag { background: var(--surface); border: 1px solid var(--border);
                      border-radius: 12px; padding: 3px 10px; font-size: 12px;
                      cursor: pointer; transition: all .15s;
                      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .msg-meta .tag:hover { border-color: var(--accent); color: var(--accent); background: rgba(37,99,235,.06); }

    .typing-indicator { display: flex; gap: 4px; padding: 14px 18px; }
    .typing-dot { width: 7px; height: 7px; background: var(--text-dim);
                   border-radius: 50%; animation: bounce .8s infinite; }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(.8); opacity:.5; }
                         40% { transform: scale(1.2); opacity:1; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Input bar ───────────────────────────── */
    .input-bar {
      padding: 12px 18px 14px; border-top: 1px solid rgba(148,163,184,.32);
      display: flex; flex-direction: column; gap: 10px; align-items: stretch;
      background: rgba(255,255,255,.88); flex-shrink: 0;
      backdrop-filter: blur(14px);
    }
    .composer-card {
      display: flex; flex-direction: column; gap: 10px;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(148,163,184,.28);
      border-radius: 18px;
      padding: 10px;
      box-shadow: 0 8px 24px rgba(15,23,42,.06);
    }
    .input-wrap { flex: 1; position: relative; }
    textarea.chat-input {
      width: 100%; background: #fff; border: 1px solid var(--border);
      color: var(--text); border-radius: 14px; padding: 12px 16px;
      font-size: 14px; resize: none; outline: none; line-height: 1.5;
      max-height: 160px; min-height: 44px; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea.chat-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .composer-row { display: flex; gap: 10px; align-items: flex-end; width: 100%; }
    .project-filter-row {
      display: flex; gap: 6px; flex-wrap: wrap; width: 100%; align-items: center;
      padding: 2px 2px 0;
    }
    .project-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(37,99,235,.08); border: 1px solid rgba(37,99,235,.25);
      border-radius: 999px; padding: 3px 9px; font-size: 11px; color: var(--accent);
    }
    .project-chip button {
      border: 0; background: transparent; color: inherit; cursor: pointer;
      padding: 0; line-height: 1; font-size: 12px;
    }
    .project-select-wrap { position: relative; flex-shrink: 0; }
    .project-badge {
      height: 44px; min-width: 164px;
      background: #fff; border: 1px solid var(--border);
      border-radius: 14px; padding: 0 12px; font-size: 12px; color: var(--text);
      cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .project-badge:hover { border-color: var(--accent); color: var(--accent); }
    .project-badge.active { background: linear-gradient(135deg, #2563EB, #1D4ED8); color: #fff; border-color: #2563EB; }
    .project-badge-copy { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.05; gap: 2px; }
    .project-badge-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: inherit; opacity: .72; }
    .project-badge-value { font-size: 13px; font-weight: 600; color: inherit; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 125px; }
    .project-menu {
      position: absolute; bottom: calc(100% + 8px); left: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 8px; min-width: 260px;
      box-shadow: 0 18px 45px rgba(15,23,42,.16); z-index: 50;
    }
    .project-menu-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px; padding: 2px 4px 8px; border-bottom: 1px solid var(--border);
    }
    .project-menu-head span:first-child { letter-spacing: .02em; }
    .project-option {
      display: flex; align-items: center; gap: 8px; padding: 8px;
      border-radius: 9px; cursor: pointer; transition: background .1s;
    }
    .project-option:hover { background: #F8FAFC; }
    .project-option.active { background: rgba(37,99,235,.08); }
    .project-check {
      width: 16px; height: 16px; border-radius: 5px; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .project-option.active .project-check { border-color: var(--accent); background: var(--accent); color: #fff; }
    .send-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 12px; width: 44px; height: 44px; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s;
      box-shadow: 0 1px 3px rgba(37,99,235,.2);
    }
    .send-btn:hover { box-shadow: 0 2px 6px rgba(37,99,235,.3); }
    .send-btn:disabled { opacity: .4; cursor: default; box-shadow: none; }

    /* ── Wiki tree panel ─────────────────────── */
      .wiki-shell { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
      .wiki-toolbar {
        padding: 10px 12px 8px; border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,250,252,.88));
      }
      .wiki-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
      .wiki-stat {
        border: 1px solid var(--border); border-radius: 10px; padding: 7px 8px;
        background: var(--surface); box-shadow: 0 1px 2px rgba(15,23,42,.03);
      }
      .wiki-stat strong { display: block; font-size: 14px; color: var(--text); line-height: 1; }
      .wiki-stat span { display: block; margin-top: 3px; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; }
      .wiki-workspace {
        flex: 1; min-height: 0; display: grid;
        grid-template-columns: minmax(180px, 38%) minmax(0, 1fr);
        background: rgba(248,250,252,.65);
      }
      .wiki-workspace.no-page { display: block; overflow-y: auto; }
      .wiki-nav-pane {
        min-width: 0; overflow-y: auto; border-right: 1px solid var(--border);
        background: rgba(255,255,255,.72);
      }
      .wiki-nav-pane::-webkit-scrollbar,
      .page-viewer::-webkit-scrollbar { width: 5px; }
      .wiki-nav-pane::-webkit-scrollbar-thumb,
      .page-viewer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
      .wiki-tree { padding: 8px 8px; }
    .project-section { margin-bottom: 12px; }
    .project-label {
      font-size: 11px; font-weight: 700; color: var(--accent2);
      text-transform: uppercase; letter-spacing: .06em;
      padding: 6px 8px; margin-bottom: 4px;
    }
      .wiki-item {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 10px; border-radius: 9px; cursor: pointer;
        font-size: 13px; color: var(--text-dim); transition: all .1s;
        margin: 1px 6px;
      }
      .wiki-item:hover { background: #F1F5F9; color: var(--text); transform: translateX(1px); }
      .wiki-item.active {
        background: linear-gradient(135deg, rgba(37,99,235,.12), rgba(79,70,229,.08));
        color: var(--accent); font-weight: 600; box-shadow: inset 3px 0 0 var(--accent);
      }
    .wiki-item .item-type { font-size: 10px; color: var(--text-dim);
                             background: var(--surface2); border-radius: 4px;
                             padding: 2px 5px; }
    .wiki-item .item-conf { margin-left: auto; font-size: 10px;
                             color: var(--text-dim); font-weight: 600; }
    .conf-high { color: var(--green) !important; }
    .conf-mid  { color: var(--yellow) !important; }
    .conf-low  { color: var(--red) !important; }

    /* ── Empty states ───────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 20px; text-align: center;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
    .empty-state .title { font-size: 14px; color: var(--text); margin-bottom: 4px; }
    .empty-state .desc { font-size: 13px; }
      .wiki-search-input {
        width: 100%; background: var(--surface2); border: 1px solid var(--border);
        color: var(--text); border-radius: 8px; padding: 8px 12px;
        font-size: 13px; outline: none;
        transition: border-color .15s, box-shadow .15s;
      }
      .wiki-search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

      /* ── Page viewer (right panel bottom) ───── */
      .page-viewer {
        min-width: 0; overflow-y: auto; padding: 18px;
        background: linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 100%);
      }
      .page-viewer::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
      .page-header-card {
        margin: 0 0 16px; padding: 12px;
        background: rgba(255,255,255,.94); border-bottom: 1px solid var(--border);
        border: 1px solid var(--border); border-radius: 14px;
      }
      .page-compact-head { display: flex; align-items: flex-start; gap: 10px; justify-content: space-between; }
      .page-title { font-size: 18px; line-height: 1.25; font-weight: 800; margin-bottom: 2px; color: var(--text); letter-spacing: -.02em; }
      .page-slug { font-size: 11px; color: var(--text-dim); overflow-wrap: anywhere; }
      .page-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
      .page-tag { font-size: 11px; background: var(--surface2);
                   border: 1px solid var(--border); border-radius: 12px; padding: 3px 8px; }
      .page-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
      .page-action-btn {
        border: 1px solid var(--border); border-radius: 9px; padding: 6px 10px;
        background: var(--surface); color: var(--text-dim); font-size: 12px;
        cursor: pointer; transition: all .15s;
      }
      .page-action-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(37,99,235,.06); }
      .page-detail-toggle { white-space: nowrap; }
      .page-synopsis {
        background: #EFF6FF; border: 1px solid #BFDBFE; color: #1E3A8A;
        border-radius: 12px; padding: 12px 14px; font-size: 13px; line-height: 1.55;
        margin-bottom: 14px;
      }
      .page-links-card {
        border: 1px solid var(--border); border-radius: 12px; padding: 12px;
        background: var(--surface); margin: 14px 0; box-shadow: 0 1px 2px rgba(15,23,42,.03);
      }
      .page-links-title { font-size: 12px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .04em; }
      .page-links-list { display: flex; flex-wrap: wrap; gap: 6px; }
      .page-link-chip {
        border: 1px solid var(--border); border-radius: 999px; padding: 4px 9px;
        background: var(--surface2); color: var(--accent); font-size: 12px; cursor: pointer;
      }
      .page-link-chip:hover { border-color: var(--accent); background: rgba(37,99,235,.08); }
      .page-content { font-size: 15px; line-height: 1.78; color: var(--text); overflow-wrap: anywhere; }
      .page-content h1,.page-content h2,.page-content h3 { color: var(--text); margin: 18px 0 8px; letter-spacing: -.01em; }
      .page-content h1 { font-size: 22px; }
      .page-content h2 { font-size: 18px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
      .page-content h3 { font-size: 16px; color: #334155; }
      .page-content p { margin-bottom: 10px; }
      .page-content code { background: rgba(0,0,0,.06); padding: 2px 6px;
                            border-radius: 4px; font-size: 13px; }
    .page-content pre { background: var(--surface2); padding: 12px;
                          border-radius: 8px; overflow-x: auto; margin: 8px 0;
                          border: 1px solid var(--border); font-size: 13px; }
    .page-content table { width: 100%; border-collapse: collapse;
                           font-size: 13px; margin: 8px 0; }
    .page-content th, .page-content td { border: 1px solid var(--border);
                                           padding: 6px 10px; }
    .superseded-banner {
      background: rgba(248,113,113,.08); border: 1px solid var(--red);
      border-radius: 8px; padding: 10px 14px; margin-bottom: 12px;
      font-size: 13px; color: var(--red);
    }

    /* ── Conflicts tab ───────────────────────── */
    .tab-bar {
      display: flex; border-bottom: 1px solid var(--border);
      padding: 0 12px; gap: 0; flex-shrink: 0; background: var(--surface);
    }
    .tab {
      padding: 12px 16px; font-size: 13px; color: var(--text-dim);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s; font-weight: 500;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .badge {
      background: var(--red); color: #fff; border-radius: 10px;
      font-size: 10px; padding: 1px 5px; margin-left: 5px;
    }

    .conflict-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; margin: 8px; padding: 14px;

    .conflict-id { font-size: 12px; color: var(--accent); font-weight: 600; }
    .conflict-type { font-size: 12px; color: var(--text-dim); margin: 4px 0; }

    .conflict-ctx {

    @keyframes slide-in { from { transform: translateX(20px); opacity:0; }
                           to   { transform: translateX(0);   opacity:1; } }
    .icon-btn { background: none; border: none; cursor: pointer;

    .auth-btn:hover { opacity: .9; }
    .auth-btn:disabled { opacity: .4; cursor: default; }
    .auth-error {
      background: rgba(220,38,38,.06); border: 1px solid var(--red);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--red);
      margin-bottom: 14px;

    /* ── User menu ───────────────────────────── */
    .user-menu-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 5px 12px;
      font-size: 13px; cursor: pointer; font-weight: 500;
      display: flex; align-items: center; gap: 6px; transition: all .15s;

    .user-menu-dropdown {
      position: absolute; top: calc(var(--header-h) + 4px); right: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px; min-width: 260px;

    .usage-bar { margin-bottom: 8px; }
    .usage-label { font-size: 11px; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 3px; }
    .usage-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .usage-fill { height: 100%; border-radius: 3px; transition: width .3s; }
    .usage-fill.green { background: var(--green); }
    .usage-fill.yellow { background: var(--yellow); }
    .usage-fill.red { background: var(--red); }
    .usage-reset { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
    .user-menu-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .user-menu-logout {

      font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s;
    }

    /* ── Quota exceeded banner ───────────────── */
    .quota-banner {

      border-radius: 8px; padding: 10px 16px; margin: 8px 16px;

    }
      .quota-banner .spacer { flex: 1; }

          position: fixed; top: var(--header-h); right: 0; bottom: 0;
          z-index: 30; max-width: 100vw;
        }
        .wiki-workspace { display: flex; flex-direction: column; }
        .wiki-nav-pane { max-height: 38%; border-right: none; border-bottom: 1px solid var(--border); }
        .page-viewer { padding: 14px; }
        .page-header-card { padding: 12px; }

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────
// API helpers
// ─────────────────────────────────────────────
function getAuthHeaders(extra = {}) {
  const token = sessionStorage.getItem('wiki_token');
  return token ? { ...extra, 'Authorization': `Bearer ${token}` } : { ...extra };
}

function getWikiAccessToken() {
  return sessionStorage.getItem('wiki_token');
}

function buildRawDownloadHref(rawPath) {
  const href = `/api/wiki/raw/${encodeURI(rawPath)}`;
  const token = getWikiAccessToken();
  return token ? `${href}?access_token=${encodeURIComponent(token)}` : href;
}

function rewriteRawDownloadLinks(html) {
  const token = getWikiAccessToken();
  if (!token) return html;
  return html.replace(
    /href="\/api\/wiki\/raw\/([^"]+)"/g,
    (_, rawPath) => `href="${buildRawDownloadHref(rawPath)}"`
  );
}

const api = {
  async get(path) {
    const headers = getAuthHeaders();
    const r = await fetch(`/api${path}`, { headers });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(path, body) {
    const headers = getAuthHeaders({ 'Content-Type': 'application/json' });
    const r = await fetch(`/api${path}`, { method: 'POST', headers, body: JSON.stringify(body) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async upload(project, files, onProgress) {
    const results = [];
    for (let i = 0; i < files.length; i++) {
      const form = new FormData();
      form.append('project', project);
      form.append('file', files[i]);
      const r = await fetch('/api/ingest', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: form,
      });
      if (!r.ok) {
        const err = await r.json().catch(async () => ({ detail: await r.text() }));
        throw new Error(err.detail || err.message || `Ошибка загрузки: ${r.status}`);
      }
      const data = await r.json();
      results.push(data);
      onProgress(i + 1, files.length);
    }
    return results;
  },
};

// SSE helper — yields parsed events
function createSSE(path, onEvent, onDone) {
  const ctrl = new AbortController();
  (async () => {
    const r = await fetch(`/api${path}`, {
      method: 'POST',
      headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
      signal: ctrl.signal,
    });
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (part.startsWith('data: ')) {
          try { onEvent(JSON.parse(part.slice(6))); } catch {}
        }
      }
    }
    onDone?.();
  })().catch(() => {});
  return () => ctrl.abort();
}

// ─────────────────────────────────────────────
// Toast context
// ─────────────────────────────────────────────
const ToastCtx = React.createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div className="toasts">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}

// ─────────────────────────────────────────────
// Auth context
// ─────────────────────────────────────────────
const AuthCtx = React.createContext(null);

function AuthProvider({ children }) {
  const [authState, setAuthState] = useState({ loading: true, mode: 'personal_local', user: null, credits: null });

  useEffect(() => {
    (async () => {
      const token = sessionStorage.getItem('wiki_token');
      const clearStaleToken = () => {
        if (token) sessionStorage.removeItem('wiki_token');
      };

      try {
        const r = await fetch('/api/auth/me', {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
        if (r.ok) {
          const data = await r.json();
          if (data?.credits && data?.workspace) {
            setAuthState({ loading: false, mode: 'multi_user', user: data.user, credits: data.credits });
          } else {
            clearStaleToken();
            const hr = await fetch('/api/health');
            if (hr.ok) {
              const health = await hr.json();
              setAuthState({
                loading: false,
                mode: health.mode || 'personal_local',
                user: null,
                credits: null,
              });
            } else {
              setAuthState({ loading: false, mode: 'personal_local', user: null, credits: null });
            }
          }
        } else {
          clearStaleToken();
          const hr = await fetch('/api/health');
          if (hr.ok) {
            const data = await hr.json();
            setAuthState({
              loading: false,
              mode: data.mode || 'personal_local',
              user: null,
              credits: null,
            });
          } else {
            setAuthState({ loading: false, mode: 'personal_local', user: null, credits: null });
          }
        }
      } catch {
        clearStaleToken();
        setAuthState({ loading: false, mode: 'personal_local', user: null, credits: null });
      }
    })();
  }, []);

  const login = async (email, password) => {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: 'Login failed' }));
      throw new Error(err.detail || err.message || 'Login failed');
    }
    const data = await r.json();
    sessionStorage.setItem('wiki_token', data.token);
    setAuthState({ loading: false, mode: 'multi_user', user: data.user, credits: null });
    return data;
  };

  const register = async (email, password) => {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: 'Registration failed' }));
      throw new Error(err.detail || err.message || 'Registration failed');
    }
    const data = await r.json();
    sessionStorage.setItem('wiki_token', data.token);
    setAuthState({ loading: false, mode: 'multi_user', user: data.user, credits: data.credits });
    return data;
  };

  const logout = async () => {
    const token = sessionStorage.getItem('wiki_token');
    if (token) {
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: getAuthHeaders(),
        });
      } catch {}
    }
    sessionStorage.removeItem('wiki_token');
    setAuthState({ loading: false, mode: 'multi_user', user: null, credits: null });
  };

  const refreshCredits = async () => {
    const token = sessionStorage.getItem('wiki_token');
    if (!token || authState.mode !== 'multi_user') return;
    try {
      const r = await fetch('/api/usage/me', {
        headers: getAuthHeaders(),
      });
      if (r.ok) {
        const data = await r.json();
        setAuthState(prev => ({ ...prev, credits: { daily: data.daily, welcome: data.welcome } }));
      } else if (r.status === 400 || r.status === 401) {
        sessionStorage.removeItem('wiki_token');
        setAuthState(prev => ({ ...prev, mode: 'personal_local', user: null, credits: null }));
      }
    } catch {}
  };

  return (
    <AuthCtx.Provider value={{ authState, login, register, logout, refreshCredits }}>
      {children}
    </AuthCtx.Provider>
  );
}

// ─────────────────────────────────────────────
// Auth Screen (Login / Register)
// ─────────────────────────────────────────────
function AuthScreen() {
  const { login, register } = React.useContext(AuthCtx);
  const [tab, setTab] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      if (tab === 'login') {
        await login(email, password);
      } else {
        await register(email, password);
      }
    } catch(err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="auth-screen">
      <div className="auth-card">
        <h2>🧠 Wiki Движок</h2>
        <div className="subtitle">Войдите или создайте аккаунт</div>
        <div className="auth-tabs">
          <div className={`auth-tab ${tab==='login'?'active':''}`} onClick={() => { setTab('login'); setError(''); }}>
            Вход
          </div>
          <div className={`auth-tab ${tab==='register'?'active':''}`} onClick={() => { setTab('register'); setError(''); }}>
            Регистрация
          </div>
        </div>
        {error && <div className="auth-error">{error}</div>}
        <form onSubmit={handleSubmit}>
          <div className="auth-field">
            <label>Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                   placeholder="you@example.com" required autoComplete="email" />
          </div>
          <div className="auth-field">
            <label>Пароль</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                   placeholder="Минимум 8 символов" required minLength={8} autoComplete="current-password" />
          </div>
          <button className="auth-btn" type="submit" disabled={loading}>
            {loading ? 'Загрузка...' : (tab === 'login' ? 'Войти' : 'Создать аккаунт')}
          </button>
        </form>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// User Menu (header)
// ─────────────────────────────────────────────
function UserMenu() {
  const { authState, logout, refreshCredits } = React.useContext(AuthCtx);
  const [open, setOpen] = useState(false);
  const menuRef = useRef();

  useEffect(() => {
    const handler = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  useEffect(() => { refreshCredits(); }, []);

  const { user, credits } = authState;
  if (!user) return null;

  const usagePct = credits?.daily?.limit > 0
    ? Math.round((credits.daily.used / credits.daily.limit) * 100)
    : 0;
  const usageColor = usagePct > 80 ? 'red' : usagePct > 50 ? 'yellow' : 'green';
  const welcomePct = credits?.welcome?.limit > 0
    ? Math.round((credits.welcome.used / credits.welcome.limit) * 100)
    : 0;
  const welcomeColor = welcomePct > 80 ? 'red' : welcomePct > 50 ? 'yellow' : 'green';

  return (
    <div style={{ position: 'relative' }} ref={menuRef}>
      <button className="user-menu-btn" onClick={() => setOpen(v => !v)}>
        👤 {user.email}
      </button>
      {open && (
        <div className="user-menu-dropdown">
          <div className="user-menu-email">{user.email}</div>
          {credits && (
            <>
              <div className="usage-bar">
                <div className="usage-label">
                  <span>Ежедневный лимит</span>
                  <span>{credits.daily.remaining} / {credits.daily.limit}</span>
                </div>
                <div className="usage-track">
                  <div className={`usage-fill ${usageColor}`} style={{ width: `${usagePct}%` }} />
                </div>
                {credits.daily.reset_at && (
                  <div className="usage-reset">Сброс: {new Date(credits.daily.reset_at).toLocaleString()}</div>
                )}
              </div>
              <div className="usage-bar">
                <div className="usage-label">
                  <span>Приветственный лимит</span>
                  <span>{credits.welcome.remaining} / {credits.welcome.limit}</span>
                </div>
                <div className="usage-track">
                  <div className={`usage-fill ${welcomeColor}`} style={{ width: `${welcomePct}%` }} />
                </div>
              </div>
            </>
          )}
          <hr className="user-menu-divider" />
          <button className="user-menu-logout" onClick={() => { logout(); setOpen(false); }}>
            Выйти
          </button>
        </div>
      )}
    </div>
  );
}

// Audit Modal
// ─────────────────────────────────────────────
function AuditModal({ onClose }) {
  const toast = React.useContext(ToastCtx);
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [showAll, setShowAll] = useState(false);
  const [lintRunning, setLintRunning] = useState(false);
  const [lintResult, setLintResult] = useState(null);

  const runAudit = async () => {
    setRunning(true);
    setError(null);
    setResult(null);
    try {
      const r = await fetch('/api/audit/duplicates', {
        headers: getAuthHeaders(),
      });
      if (!r.ok) {
        const err = await r.json();
        throw new Error(err.detail || `Ошибка: ${r.status}`);
      }
      const data = await r.json();
      setResult(data);
      if (data.total === 0) {
        toast('Аудит завершён — дубликаты не найдены', 'success');
      }
    } catch(e) {
      setError(e.message);
      toast(`Ошибка аудита: ${e.message}`, 'error');
    } finally {
      setRunning(false);
    }
  };

  const runLint = async () => {
    setLintRunning(true);
    try {
      const r = await fetch('/api/audit/lint', {
        headers: getAuthHeaders(),
      });
      if (!r.ok) throw new Error((await r.json()).detail || `Ошибка: ${r.status}`);
      const data = await r.json();
      setLintResult(data);
      toast(data.is_clean ? '✓ Линтинг пройден' : `✗ ${data.errors} ошибок, ${data.warnings} предупреждений`, data.is_clean ? 'success' : 'warning');
    } catch(e) {
      toast(`Ошибка линтинга: ${e.message}`, 'error');
    } finally {
      setLintRunning(false);
    }
  };

  const candidates = result?.candidates || [];
  const displayed = showAll ? candidates : candidates.filter(c => c.score >= 0.9);

  const lintIcon = (k) => {
    if (k === 'broken_wikilink' || k === 'missing_frontmatter' || k === 'char_limit') return '🔴';
    if (k === 'invalid_provenance' || k === 'orphan_page' || k === 'stale_page' || k === 'superseded_active') return '🟡';
    return '🟢';
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && !running && onClose()}>
      <div className="modal" style={{maxWidth:640}}>
        <h2 style={{marginBottom:4}}>🔍 Аудит Wiki</h2>

        {/* ── Пересечения / дубликаты ── */}
        <div style={{fontSize:13, color:'var(--gray)', marginBottom:10}}>
          Поиск дублирующихся или частично перекрывающихся страниц.
        </div>

        {result === null && !running && !error && (
          <div style={{textAlign:'center', padding:'14px 0'}}>
            <button className="btn-primary" onClick={runAudit}>
              🔍 Запустить аудит
            </button>
          </div>
        )}

        {running && (
          <div style={{textAlign:'center', padding:'14px 0', color:'var(--text-dim)'}}>
            ⏳ Проверка страниц…
          </div>
        )}

        {error && (
          <div style={{padding:'10px', background:'rgba(220,38,38,.08)', borderRadius:6,
                       color:'var(--red)', fontSize:13, marginBottom:10}}>
            {error}
          </div>
        )}

        {result !== null && result.total === 0 && (
          <div style={{padding:'10px 0', color:'var(--green)', fontSize:13}}>
            ✓ Дубликаты и пересечения не найдены.
          </div>
        )}

        {result !== null && result.total > 0 && (
          <>
            <div style={{marginBottom:8, display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
              <span style={{fontSize:13, fontWeight:600}}>
                {showAll ? `Все (${candidates.length})` : `Дубликаты (${displayed.length})`}
              </span>
              {candidates.length > displayed.length && (
                <button className="header-btn" onClick={() => setShowAll(!showAll)} style={{fontSize:12}}>
                  {showAll ? '← Только дубликаты' : `+ Пересечения (${candidates.length - displayed.length})`}
                </button>
              )}
            </div>
            <div style={{maxHeight:200, overflowY:'auto', marginBottom:10}}>
              {displayed.map((c, i) => (
                <div key={i} style={{
                  padding:'8px 10px', marginBottom:6, borderRadius:6,
                  border:'1px solid var(--border)', fontSize:13
                }}>
                  <div style={{display:'flex', justifyContent:'space-between', marginBottom:2}}>
                    <span style={{fontWeight:600}}>
                      {c.kind === 'duplicate' ? '🔁' : '🔗'} {c.reason}
                    </span>
                    <span style={{fontSize:11, color:'var(--text-dim)'}}>
                      {Math.round(c.score * 100)}%
                    </span>
                  </div>
                  <div style={{color:'var(--text-dim)', fontSize:12}}>
                    {c.pages.map((slug, j) => (
                      <div key={j}>📄 <strong>{c.titles?.[slug] || slug}</strong>
                        <span style={{color:'var(--text-dim)', marginLeft:4, fontSize:11}}>{slug}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:11, color:'var(--text-dim)', marginTop:2}}>→ {c.recommended_action}</div>
                </div>
              ))}
            </div>
          </>
        )}

        {/* ── Структурный линтинг ── */}
        <hr style={{margin:'10px 0', border:'none', borderTop:'1px solid var(--border)'}} />
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <span style={{fontSize:13, fontWeight:600}}>📋 Структурный линтинг</span>
          <button className="header-btn" onClick={runLint} disabled={lintRunning} style={{fontSize:12}}>
            {lintRunning ? '⏳' : '▶'} Проверить
          </button>
        </div>

        {lintResult && (
          <div style={{maxHeight:200, overflowY:'auto'}}>
            {lintResult.is_clean ? (
              <div style={{color:'var(--green)', fontSize:13, padding:'6px 0'}}>
                ✓ Все {lintResult.total_pages} страниц в порядке
              </div>
            ) : (
              <>
                <div style={{fontSize:12, marginBottom:6, color:'var(--text-dim)'}}>
                  {lintResult.errors} ошибок, {lintResult.warnings} предупреждений на {lintResult.total_pages} страницах
                </div>
                {Object.entries(lintResult.by_kind || {}).map(([kind, items]) => (
                  <div key={kind} style={{marginBottom:4, fontSize:12}}>
                    <div style={{fontWeight:600, marginBottom:2}}>{lintIcon(kind)} {kind}</div>
                    {items.slice(0, 5).map((item, j) => (
                      <div key={j} style={{paddingLeft:16, color:'var(--text-dim)', lineHeight:1.6}}>
                        {item}
                      </div>
                    ))}
                  </div>
                ))}
              </>
            )}
          </div>
        )}

        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose} disabled={running}>
            {result !== null ? 'Закрыть' : 'Отмена'}
          </button>
          {result !== null && (
            <button className="btn-primary" onClick={() => { setResult(null); runAudit(); }}
                    disabled={running}>
              {running ? 'Проверка…' : '🔄 Повторить'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}



// ─────────────────────────────────────────────
// Upload Modal
// ─────────────────────────────────────────────
function UploadModal({ onClose, onDone }) {
  const toast = React.useContext(ToastCtx);
  const [project, setProject] = useState('_general');
  const [projects, setProjects] = useState([]);
  const [newProject, setNewProject] = useState(false);
  const [newProjectName, setNewProjectName] = useState('');
  const [files, setFiles] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState([0, 0]);
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef();

  const ALLOWED_EXTS = ['.md', '.txt', '.py', '.pdf', '.docx', '.pptx'];

  // Load projects on mount
  useEffect(() => {
    api.get('/wiki/projects').then(r => setProjects(r.projects || [])).catch(() => {});
  }, []);

  const addFiles = fs => {
    const allowed = [...fs].filter(f => ALLOWED_EXTS.some(ext => f.name.toLowerCase().endsWith(ext)));
    if (allowed.length < fs.length) toast('Неподдерживаемый формат. Допустимы: ' + ALLOWED_EXTS.join(', '), 'error');
    setFiles(prev => [...prev, ...allowed]);
  };

  const handleDrop = e => {
    e.preventDefault(); setDragOver(false);
    addFiles(e.dataTransfer.files);
  };

  const handleProjectChange = e => {
    if (e.target.value === '__new__') {
      setNewProject(true);
      setProject('');
    } else {
      setNewProject(false);
      setProject(e.target.value);
    }
  };

  const handleNewProjectConfirm = () => {
    const name = newProjectName.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
    if (!name) { toast('Недопустимое имя проекта', 'error'); return; }
    setProject(name);
    setNewProject(false);
    setProjects(prev => [...prev, { name, wiki_pages: 0, raw_files: 0 }]);
    setNewProjectName('');
  };

  const upload = async () => {
    if (!files.length) return;
    if (!project) { toast('Выберите или создайте проект', 'error'); return; }
    setUploading(true);
    try {
      const results = await api.upload(project, files, (cur, tot) =>
        setProgress([cur, tot])
      );
      const ok = results.filter(r => r.success).length;
      const conflicts = results.flatMap(r => r.conflict_ids || []).length;
      toast(`Загружено ${ok}/${files.length} файлов${conflicts ? `, конфликтов: ${conflicts}` : ''}`, 'success');
      onDone?.(results);
      onClose();
    } catch(e) {
      toast(`Ошибка загрузки: ${e.message}`, 'error');
    } finally {
      setUploading(false);
    }
  };

  const extHint = ALLOWED_EXTS.join(', ');

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h2>📂 Загрузка документов</h2>
        <label>Проект</label>
        {newProject ? (
          <div style={{display:'flex', gap:8}}>
            <input value={newProjectName} onChange={e => setNewProjectName(e.target.value)}
                   placeholder="имя-нового-проекта" style={{flex:1}} />
            <button className="btn-primary" onClick={handleNewProjectConfirm}>✓</button>
            <button className="btn-cancel" onClick={() => setNewProject(false)}>✕</button>
          </div>
        ) : (
          <select value={project} onChange={handleProjectChange} style={{width:'100%', padding:'8px'}}>
            {(projects.length ? projects : [{name:'_general', wiki_pages:0, raw_files:0}]).map(p => (
              <option key={p.name} value={p.name}>
                {p.name} ({p.wiki_pages} wiki, {p.raw_files} raw)
              </option>
            ))}
            <option value="__new__">+ Новый проект...</option>
          </select>
        )}
        <div
          className={`dropzone ${dragOver ? 'drag-over' : ''}`}
          onClick={() => inputRef.current.click()}
          onDrop={handleDrop}
          onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
        >
          Перетащите файлы сюда или нажмите для выбора
          <br/><span style={{fontSize:11, color:'var(--gray)'}}>{extHint}</span>
          <input ref={inputRef} type="file" accept={ALLOWED_EXTS.join(',')} multiple hidden
                 onChange={e => addFiles(e.target.files)} />
        </div>
        {files.length > 0 && (
          <div className="file-list">
            {files.map((f, i) => (
              <div key={i} className="file-item">
                <span className="fname">{f.name}</span>
                <span className="fsize">{Math.round(f.size/1024)}KB</span>
                <span className="fremove"
                      onClick={() => setFiles(fs => fs.filter((_,j)=>j!==i))}>✕</span>
              </div>
            ))}
          </div>
        )}
        {uploading && (
          <div className="upload-progress">
            Обработка {progress[0]}/{progress[1]}...
            <div className="progress-bar">
              <div className="progress-fill"
                   style={{width: `${progress[1] ? (progress[0]/progress[1]*100) : 0}%`}} />
            </div>
          </div>
        )}
        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose}>Отмена</button>
          <button className="btn-primary" onClick={upload}
                  disabled={!files.length || uploading || !project}>
            {uploading ? 'Загрузка…' : `Загрузить ${files.length} файл(ов)`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// Rebuild Modal
// ─────────────────────────────────────────────
function RebuildModal({ onClose, onRefresh }) {
  const toast = React.useContext(ToastCtx);
  const [running, setRunning] = useState(false);
  const [log, setLog] = useState([]);
  const [done, setDone] = useState(false);
  const logRef = useRef();

  const addLog = (text, cls = '') => {
    setLog(l => [...l, { text, cls }]);
    setTimeout(() => logRef.current?.scrollTo(0, 99999), 50);
  };

  const run = async () => {
    setRunning(true); setLog([]); setDone(false);
    addLog('Начало перестройки с нуля…', 'info');
    try {
      const stop = createSSE(
        '/ingest/rebuild',
        ev => {
          if (ev.status === 'processing') {
            addLog(`[${ev.current}/${ev.total}] ${ev.filename}`);
          } else if (ev.status === 'complete') {
            const r = ev.result;
            addLog(`Готово: ${r.success}✓ ${r.failed}✗ ${r.conflict_ids?.length||0} конфликтов`, 'ok');
            if (r.errors?.length) r.errors.forEach(e => addLog(`  ✗ ${e.file}: ${e.error}`, 'err'));
            setDone(true);
          } else if (ev.status === 'failed') {
            addLog(`Ошибка: ${JSON.stringify(ev)}`, 'err');
          }
        },
        () => setRunning(false)
      );
    } catch(e) {
      addLog(`Ошибка: ${e.message}`, 'err');
      setRunning(false);
    }
  };

  // POST trigger (SSE needs body)
  const handleRun = async () => {
    setRunning(true); setLog([]); setDone(false);
    addLog('Начало перестройки…', 'info');
    const r = await fetch('/api/ingest/rebuild', {
      method: 'POST',
      headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ confirm: true }),
    });
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done: d, value } = await reader.read();
      if (d) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(part.slice(6));
          if (ev.status === 'processing') addLog(`[${ev.current}/${ev.total}] ${ev.filename}`);
          else if (ev.status === 'complete') {
            const res = ev.result;
            addLog(`Готово: ${res.success}✓  ${res.failed}✗  конфликтов: ${res.conflict_ids?.length||0}`, 'ok');
            res.errors?.forEach(e => addLog(`  ✗ ${e.file}: ${e.error}`, 'err'));
            setDone(true);
            if (onRefresh) onRefresh();
          }
        } catch {}
      }
    }
    setRunning(false);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && !running && onClose()}>
      <div className="modal">
        <h2>🔄 Перестройка Wiki из RAW</h2>
        <p style={{fontSize:13, color:'var(--red)', marginBottom:12}}>
          ⚠️ Это УДАЛИТ все wiki-страницы и перестроит их с нуля.
          Исходные файлы и skills.md будут сохранены.
        </p>
        <div className="rebuild-log" ref={logRef}>
          {log.map((l,i) => <div key={i} className={l.cls}>{l.text}</div>)}
          {!log.length && <span>Нажмите «Запустить перестройку» для начала.</span>}
        </div>
        <div className="modal-actions" style={{marginTop:12}}>
          <button className="btn-cancel" onClick={onClose} disabled={running}>Закрыть</button>
          <button className="btn-primary danger" onClick={handleRun}
                  disabled={running || done}
                  style={{background: done ? 'var(--green)' : 'var(--red)'}}>
            {running ? 'Перестройка…' : done ? 'Завершено ✓' : 'Запустить перестройку'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// Conflict Detail Modal — guided resolution flow
// ─────────────────────────────────────────────
function ConflictDetailModal({ conflict, onClose, onResolved }) {
  const toast = React.useContext(ToastCtx);
  const [step, setStep] = useState(1);
  const [choice, setChoice] = useState('');
  const [comment, setComment] = useState('');
  const [skillRule, setSkillRule] = useState('');
  const [skillSection, setSkillSection] = useState('Conflict Resolution Patterns');
  const [resolving, setResolving] = useState(false);

  if (!conflict) return null;

  const c = conflict;
  const choices = [
    { value: 'trust_wiki', label: 'Доверить wiki', desc: 'Текущая wiki-страница верна, источник устарел или неверен' },
    { value: 'trust_source', label: 'Доверить источнику', desc: 'Новый источник точнее, wiki нужно обновить' },
    { value: 'both_true', label: 'Оба верны в разных контекстах', desc: 'Разные проекты, фазы или условия — не настоящий конфликт' },
    { value: 'needs_followup', label: 'Требует уточнения', desc: 'Недостаточно информации для решения' },
    { value: 'ignore', label: 'Игнорировать', desc: 'Не является реальным конфликтом' },
  ];

  const sections = [
    'Source Trust Rules', 'Conflict Resolution Patterns', 'Domain Conventions',
    'Query Formatting Rules', 'Ingest Patterns',
  ];

  const handleResolve = async () => {
    if (!choice) { toast('Выберите вариант решения', 'error'); return; }
    setResolving(true);
    try {
      const choiceText = choices.find(ch => ch.value === choice)?.label || choice;
      await api.post(`/conflicts/${c.id}/resolve`, {
        resolution: choiceText,
        user_comment: comment,
        extract_skill: !!skillRule.trim(),
      });
      if (skillRule.trim()) {
        await api.post(`/conflicts/${c.id}/skill`, {
          section: skillSection,
          rule: skillRule.trim(),
        });
      }
      toast('Конфликт решён', 'success');
      onResolved?.();
      onClose();
    } catch(e) {
      toast(`Ошибка: ${e.message}`, 'error');
    } finally {
      setResolving(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal" style={{width:640, maxWidth:'95vw', maxHeight:'90vh', overflowY:'auto'}}>
        <h2>🔍 {c.id} — {c.conflict_type}</h2>
        <div style={{fontSize:12, color:'var(--text-dim)', marginBottom:16}}>
          Проект: {c.project} · Источник: {c.source_file} · {c.date}

        {/* Step indicators */}
        <div style={{display:'flex', gap:8, marginBottom:20}}>
          {[1,2,3,4].map(s => (
            <div key={s} style={{
              flex:1, height:4, borderRadius:2,
              background: s <= step ? 'var(--accent)' : 'var(--border)',

                <div style={{fontSize:11, fontWeight:600, color:'var(--accent)', marginBottom:6}}>📄 Текущая wiki</div>
                <div style={{fontSize:12, color:'var(--text)', lineHeight:1.5, whiteSpace:'pre-wrap'}}>{c.context_a}</div>
              </div>
              <div style={{background:'rgba(255,100,100,0.06)', borderLeft:'3px solid var(--red)', padding:12, borderRadius:8}}>
                <div style={{fontSize:11, fontWeight:600, color:'var(--red)', marginBottom:6}}>📥 Новый источник</div>
                <div style={{fontSize:12, color:'var(--text)', lineHeight:1.5, whiteSpace:'pre-wrap'}}>{c.context_b}</div>
              </div>
            </div>
            {c.description && (
              <div style={{background:'var(--surface2)', borderRadius:8, padding:12, marginBottom:16, fontSize:13}}>
                <strong>Описание:</strong> {c.description}
              </div>
            )}
            <div className="modal-actions">
              <button className="btn-cancel" onClick={onClose}>Закрыть</button>
              <button className="btn-primary" onClick={() => setStep(2)}>Далее →</button>
            </div>
          </>
        )}

        {step === 2 && (
          <>
            <h3 style={{fontSize:14, marginBottom:12}}>Выберите решение</h3>
            <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:16}}>
              {choices.map(ch => (
                <div key={ch.value}
                  onClick={() => setChoice(ch.value)}
                  style={{
                    background: choice === ch.value ? 'rgba(37,99,235,0.08)' : 'var(--surface2)',
                    border: choice === ch.value ? '2px solid var(--accent)' : '1px solid var(--border)',
                    borderRadius:8, padding:12, cursor:'pointer', transition:'all .15s',
                  }}>
                  <div style={{fontSize:13, fontWeight:600, color: choice === ch.value ? 'var(--accent)' : 'var(--text)'}}>
                    {ch.label}
                  </div>
                  <div style={{fontSize:12, color:'var(--text-dim)', marginTop:2}}>{ch.desc}</div>
                </div>
              ))}
            </div>
            <div className="modal-actions">
              <button className="btn-cancel" onClick={() => setStep(1)}>← Назад</button>
              <button className="btn-primary" onClick={() => setStep(3)} disabled={!choice}>Далее →</button>
            </div>
          </>
        )}

        {step === 3 && (
          <>
            <h3 style={{fontSize:14, marginBottom:12}}>Навык (правило)</h3>
            <p style={{fontSize:12, color:'var(--text-dim)', marginBottom:12}}>
              Извлечённое правило будет добавлено в skills.md и использоваться при будущем анализе.
            </p>
            <label style={{fontSize:12, color:'var(--text-dim)', display:'block', marginBottom:4}}>Раздел</label>
            <select value={skillSection} onChange={e => setSkillSection(e.target.value)}
              style={{width:'100%', padding:8, marginBottom:12, borderRadius:6, border:'1px solid var(--border)', background:'var(--surface2)'}}>
              {sections.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <label style={{fontSize:12, color:'var(--text-dim)', display:'block', marginBottom:4}}>Правило (оставьте пустым, чтобы не сохранять)</label>
            <textarea value={skillRule} onChange={e => setSkillRule(e.target.value)}
              rows={3} placeholder="Например: Для проекта X: Redis и PostgreSQL — разные роли, не конфликт"
              style={{width:'100%', padding:10, borderRadius:8, border:'1px solid var(--border)', background:'var(--surface2)', fontSize:13, fontFamily:'inherit', resize:'vertical'}} />
            <div className="modal-actions" style={{marginTop:12}}>
              <button className="btn-cancel" onClick={() => setStep(2)}>← Назад</button>
              <button className="btn-primary" onClick={() => setStep(4)}>Далее →</button>
            </div>
          </>
        )}

        {step === 4 && (
          <>
            <h3 style={{fontSize:14, marginBottom:12}}>Подтверждение</h3>
            <div style={{background:'var(--surface2)', borderRadius:8, padding:14, marginBottom:16, fontSize:13, lineHeight:1.6}}>
              <div><strong>Конфликт:</strong> {c.id}</div>
              <div><strong>Решение:</strong> {choices.find(ch => ch.value === choice)?.label}</div>
              {comment && <div><strong>Комментарий:</strong> {comment}</div>}

            </div>

              <button className="btn-cancel" onClick={() => setStep(3)}>← Назад</button>

          </>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// Conflicts Panel
// ─────────────────────────────────────────────
function ConflictsPanel() {
  const toast = React.useContext(ToastCtx);
  const [data, setData] = useState({ open: [], resolved: [], total_open: 0 });
  const [tab, setTab] = useState('open');
  const [crossTab, setCrossTab] = useState(false);
  const [resolving, setResolving] = useState({});
  const [selections, setSelections] = useState({});
  const [comments, setComments] = useState({});
  const [addingComment, setAddingComment] = useState({});
  const [applying, setApplying] = useState({});
  const [preparing, setPreparing] = useState({});
  const [preparedDraft, setPreparedDraft] = useState({});
  const [detailConflict, setDetailConflict] = useState(null);

  const load = async () => {
    try { setData(await api.get('/conflicts')); } catch {}
  };
  useEffect(() => { load(); }, []);

  const resolve = async (id) => {
    const choice = selections[id];
    if (!choice) return;
    setResolving(r => ({...r, [id]: true}));
    try {
      const res = await api.post(`/conflicts/${id}/resolve`, {
        resolution: choice,
        user_comment: comments[id] || '',
        extract_skill: true,
      });
      toast(res.message, 'success');
      await load();
    } catch(e) {
      toast(`Ошибка: ${e.message}`, 'error');
    } finally {
      setResolving(r => ({...r, [id]: false}));
    }
  };

  const addComment = async (id) => {
    const comment = comments[id];
    if (!comment?.trim()) return;
    try {
      await api.post(`/conflicts/${id}/comment`, { comment });
      toast('Комментарий добавлен', 'success');
      setAddingComment(a => ({...a, [id]: false}));
      setComments(c => ({...c, [id]: ''}));
    } catch(e) {
      toast(`Ошибка: ${e.message}`, 'error');
    }
  };

  const prepareUpdate = async (id) => {
    setPreparing(p => ({...p, [id]: true}));
    try {
      const res = await api.post(`/conflicts/${id}/prepare-update`);
      setPreparedDraft(d => ({...d, [id]: {diff: res.diff, slug: res.affected_slug}}));
      toast('Черновик подготовлен — проверьте diff', 'success');
    } catch(e) {
      toast(`Ошибка: ${e.message}`, 'error');
    } finally {
      setPreparing(p => ({...p, [id]: false}));
    }
  };

  const applyUpdate = async (id) => {
    setApplying(a => ({...a, [id]: true}));
    try {
      const res = await api.post(`/conflicts/${id}/apply-update`);
      toast(res.message, 'success');
      setPreparedDraft(d => { const n = {...d}; delete n[id]; return n; });
      await load();
    } catch(e) {
      toast(`Ошибка: ${e.message}`, 'error');
    } finally {
      setApplying(a => ({...a, [id]: false}));
    }
  };

  const rejectUpdate = async (id) => {
    try {
      await api.post(`/conflicts/${id}/reject-update`);
      setPreparedDraft(d => { const n = {...d}; delete n[id]; return n; });
      toast('Черновик отклонён', 'success');
    } catch(e) {
      toast(`Ошибка: ${e.message}`, 'error');
    }
  };

  const list = tab === 'open' ? data.open : data.resolved;
  const openReal = data.open.filter(c => !c.is_cross_project);
  const openCross = data.open.filter(c => c.is_cross_project);
  const resolvedReal = data.resolved.filter(c => !c.is_cross_project);
  const resolvedCross = data.resolved.filter(c => c.is_cross_project);

  const displayList = tab === 'open' ? (crossTab ? openCross : openReal)
    : (crossTab ? resolvedCross : resolvedReal);

  return (
    <div style={{display:'flex', flexDirection:'column', flex:1, overflow:'hidden'}}>
      <div className="tab-bar">
        <div className={`tab ${tab==='open'&&!crossTab?'active':''}`} onClick={()=>{setTab('open');setCrossTab(false);}}>
          Конфликты {openReal.length > 0 && <span className="badge">{openReal.length}</span>}
        </div>
        <div className={`tab ${tab==='open'&&crossTab?'active':''}`} onClick={()=>{setTab('open');setCrossTab(true);}}>
          Кросс-проект {openCross.length > 0 && <span className="badge" style={{background:'var(--blue)'}}>{openCross.length}</span>}
        </div>
        <div className={`tab ${tab==='resolved'&&!crossTab?'active':''}`} onClick={()=>{setTab('resolved');setCrossTab(false);}}>
          Решённые ({resolvedReal.length})
        </div>
        <div className={`tab ${tab==='resolved'&&crossTab?'active':''}`} onClick={()=>{setTab('resolved');setCrossTab(true);}}>
          Кросс-проект ({resolvedCross.length})
        </div>
      </div>
      <div style={{flex:1, overflowY:'auto'}}>
        {displayList.length === 0 && (
          <div style={{padding:24, textAlign:'center', color:'var(--text-dim)', fontSize:13}}>
            {tab==='open' ? (crossTab ? '✓ Нет кросс-проектных различий' : '✓ Нет открытых конфликтов') : 'Нет решённых конфликтов'}
          </div>
        )}
        {displayList.map(c => (
          <div key={c.id} className={`conflict-card ${c.status.toLowerCase()} ${c.is_cross_project ? 'cross-project' : ''}`}
               onClick={() => setDetailConflict(c)} style={{cursor:'pointer'}}>
            <div className="conflict-id">{c.id} {c.is_cross_project && <span style={{fontSize:10, color:'var(--blue)', marginLeft:6}}>🔀 кросс-проект</span>}</div>
            <div className="conflict-type">
              {c.conflict_type} · {c.project} · {c.date}
            </div>
            <div style={{fontSize:11, color:'var(--text-dim)', margin:'4px 0'}}>
              <span style={{color:'var(--accent)'}}>[[{c.page_a_slug}]]</span>
              {' vs '}<span style={{color:'var(--accent2)'}}>{c.page_b_ref}</span>
            </div>
            {c.description && (
              <div style={{
                background: c.is_cross_project ? 'rgba(100,149,237,0.08)' : 'rgba(255,165,0,0.08)',
                border: c.is_cross_project ? '1px solid rgba(100,149,237,0.25)' : '1px solid rgba(255,165,0,0.25)',
                borderRadius:6, padding:'8px 12px', marginBottom:8, fontSize:12,
                color:'var(--text)', lineHeight:1.5,
              }}>
                <span style={{color: c.is_cross_project ? 'var(--blue)' : '#f90', fontWeight:600, marginRight:6}}>
                  {c.is_cross_project ? '🔀 Различие:' : '⚠ Суть конфликта:'}
                </span>
                {c.description}
              </div>
            )}
            {(c.context_a || c.context_b) && (
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:8}}>
                {c.context_a && (
                  <div style={{background:'rgba(100,149,237,0.08)', borderLeft:'3px solid var(--accent)', padding:'6px 10px', borderRadius:4}}>
                    <div style={{fontSize:10, color:'var(--accent)', fontWeight:600, marginBottom:4}}>
                      📄 В ВИКИ [[{c.page_a_slug}]]
                    </div>
                    <div style={{fontSize:11, color:'var(--text-dim)', lineHeight:1.5, whiteSpace:'pre-wrap'}}>
                      {c.context_a}
                    </div>
                  </div>
                )}
                {c.context_b && (
                  <div style={{background:'rgba(255,100,100,0.08)', borderLeft:'3px solid var(--accent2)', padding:'6px 10px', borderRadius:4}}>
                    <div style={{fontSize:10, color:'var(--accent2)', fontWeight:600, marginBottom:4}}>
                      📥 ИЗ ИСТОЧНИКА {c.source_file}
                    </div>
                    <div style={{fontSize:11, color:'var(--text-dim)', lineHeight:1.5, whiteSpace:'pre-wrap'}}>
                      {c.context_b}
                    </div>
                  </div>
                )}
              </div>
            )}

            {c.status === 'OPEN' && (
              <>
                {c.is_cross_project ? (
                  <div style={{marginTop:8}}>
                    <div style={{fontSize:11, color:'var(--text-dim)', marginBottom:8}}>
                      Это различие между проектами — не конфликт. Отметить как информационное?
                    </div>
                    <button className="btn-resolve"
                      style={{background:'var(--blue)', fontSize:11, padding:'4px 10px'}}
                      disabled={resolving[c.id]}
                      onClick={() => {
                        setSelections(s => ({...s, [c.id]: 'Mark as cross-project difference'}));
                        setComments(cm => ({...cm, [c.id]: 'Cross-project difference — informational only'}));
                        setTimeout(() => resolve(c.id), 50);
                      }}>
                      {resolving[c.id] ? 'Отмечаю…' : '✓ Отметить как кросс-проект'}
                    </button>
                  </div>
                ) : (
                  <>
                    {c.suggested_options.length > 0 && (
                      <div className="conflict-options">
                        {c.suggested_options.map((opt, i) => (
                          <div key={i}
                            className={`conflict-option ${selections[c.id]===opt?'selected':''}`}
                            onClick={() => setSelections(s => ({...s, [c.id]: opt}))}>
                            {opt}
                          </div>
                        ))}
                      </div>
                    )}
                    <textarea className="conflict-comment-input" rows={2}
                      placeholder="Ваш комментарий или указание (обязательно для извлечения навыка)…"
                      value={comments[c.id] || ''}
                      onChange={e => setComments(cm => ({...cm, [c.id]: e.target.value}))} />
                    <button className="btn-resolve"
                      disabled={!selections[c.id] || resolving[c.id]}
                      onClick={() => resolve(c.id)}>
                      {resolving[c.id] ? 'Решение…' : '✓ Решить и извлечь навык'}
                    </button>
                    <button className="btn-comment"
                      onClick={() => addComment(c.id)}>
                      + Добавить комментарий (оставить открытым)
                    </button>
                  </>
                )}
              </>
            )}
            {c.status === 'RESOLVED' && (
              <div style={{fontSize:11, color:'var(--green)', marginTop:6}}>
                ✓ {c.resolution}
                {c.skill_extracted && (
                  <div style={{color:'var(--text-dim)', marginTop:3}}>
                    Навык: {c.skill_extracted}
                  </div>
                )}
                {preparedDraft[c.id] ? (
                  <>
                    <div style={{fontSize:10, color:'var(--text-dim)', marginTop:8, marginBottom:4}}>
                      Diff для [[{preparedDraft[c.id].slug}]]:
                    </div>
                    <pre style={{
                      background:'rgba(0,0,0,0.05)',
                      borderLeft:'3px solid var(--accent)',
                      borderRadius:4,
                      padding:'8px 10px',
                      margin:'4px 0 8px',
                      fontSize:10,
                      lineHeight:1.4,
                      maxHeight:240,
                      overflow:'auto',
                      whiteSpace:'pre-wrap',
                      color:'var(--text)',
                    }}>{preparedDraft[c.id].diff || '(нет изменений)'}</pre>
                    <div style={{display:'flex', gap:6}}>
                      <button className="btn-resolve"
                        style={{fontSize:11, padding:'4px 10px'}}
                        disabled={applying[c.id]}
                        onClick={() => applyUpdate(c.id)}>
                        {applying[c.id] ? 'Применение…' : '✓ Применить'}
                      </button>
                      <button className="btn-comment"
                        style={{fontSize:11, padding:'4px 10px'}}
                        disabled={applying[c.id]}
                        onClick={() => rejectUpdate(c.id)}>
                        ✗ Отклонить
                      </button>
                    </div>
                  </>
                ) : (
                  <button className="btn-resolve"
                    style={{marginTop:8, fontSize:11, padding:'4px 10px'}}
                    disabled={preparing[c.id] || applying[c.id]}
                    onClick={() => prepareUpdate(c.id)}>
                    {preparing[c.id] ? 'Подготовка…' : '🔄 Подготовить обновление'}
                  </button>
                )}
              </div>
            )}
          </div>
        ))}
      </div>
      {detailConflict && (
        <ConflictDetailModal
          conflict={detailConflict}
          onClose={() => setDetailConflict(null)}
          onResolved={() => { setData(d => ({...d, open: d.open.filter(c => c.id !== detailConflict.id)})); }}
        />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// Drafts Panel
// ─────────────────────────────────────────────
function DraftsPanel() {
  const [drafts, setDrafts] = useState([]);
  const [loading, setLoading] = useState(true);
  const toast = React.useContext(ToastCtx);

  const loadDrafts = async () => {
    setLoading(true);
    try {
      const data = await api.get('/ingest/drafts');
      setDrafts(data.drafts);
    } catch { setDrafts([]); }
    setLoading(false);
  };

  useEffect(() => { loadDrafts(); }, []);

  const handleApply = async (id) => {
    try {
      const r = await api.post(`/ingest/drafts/${id}/apply`);
      if (r.status === 'applied') {
        toast.success(`Применено: ${r.pages.join(', ')}`);
        loadDrafts();
      }
    } catch(e) {
      toast.error(`Ошибка применения: ${e.message || 'неизвестная ошибка'}`);
    }
  };

  const handleReject = async (id) => {
    try {
      await api.post(`/ingest/drafts/${id}/reject`);
      toast.success('Черновик отклонён');
      loadDrafts();
    } catch { toast.error('Ошибка отклонения'); }
  };

  if (loading) return <div className="panel-hint">Загрузка черновиков...</div>;

  return (
    <div className="conflicts-panel">
      {drafts.length === 0 && <div className="panel-hint">Нет ожидающих черновиков.</div>}
      {drafts.map(d => (
        <div key={d.id} className="conflict-card" style={{marginBottom:8}}>
          <div style={{fontWeight:600, marginBottom:4}}>{d.id}</div>
          <div style={{fontSize:12, color:'var(--text-dim)', marginBottom:6}}>
            {d.plan_summary} &middot; {d.pages?.length || 0} pages
            &middot; {d.diff_count || 0} diffs
          </div>
          {d.pages?.length > 0 && (
            <div style={{fontSize:11, marginBottom:6}}>
              {d.pages.map(p => (
                <span key={p} className="page-tag">{p}</span>
              ))}
            </div>
          )}
          <div style={{display:'flex', gap:6}}>
            <button className="header-btn" onClick={() => handleApply(d.id)}
                    style={{color:'var(--green)', borderColor:'var(--green)'}}>
              Применить
            </button>
            <button className="header-btn danger" onClick={() => handleReject(d.id)}>
              Отклонить
            </button>
          </div>
        </div>
      ))}
    </div>
  );
}
