// Wiki Tree + Page Viewer (Right Panel)
// ─────────────────────────────────────────────
function WikiPanel({ highlightedSlug, onPageOpen, refreshKey }) {
  const [tree, setTree] = useState({ projects: {}, total_pages: 0, open_conflicts: 0 });
  const [search, setSearch] = useState('');
  const [searchResults, setSearchResults] = useState(null);
  const [activePage, setActivePage] = useState(null);
    const [pageData, setPageData] = useState(null);
    const [pageNotFound, setPageNotFound] = useState(null);
    const [tab, setTab] = useState('wiki'); // 'wiki' | 'conflicts'
    const [showPageDetails, setShowPageDetails] = useState(false);

  const loadTree = async () => {
    try { setTree(await api.get('/wiki/tree')); } catch {}
  };
  useEffect(() => { loadTree(); }, [refreshKey]);

  // Open highlighted slug from chat citation
  useEffect(() => {
    if (highlightedSlug) openPage(highlightedSlug);
  }, [highlightedSlug]);

  // Hash routing: #wiki/project/page → openPage
  useEffect(() => {
    const onHash = () => {
      const hash = window.location.hash;
      if (!hash.startsWith('#wiki/')) return;
      const slug = hash.slice(6); // remove '#wiki/'
      if (slug) openPage(slug);
    };
    window.addEventListener('hashchange', onHash);
    // Handle existing hash on mount
    onHash();
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // When wiki is rebuilt (refreshKey changes), clear the stale open page.
  // Skip on initial mount (refreshKey=0) to allow hash routing to work.
  const rebuildCount = React.useRef(0);
  useEffect(() => {
    if (rebuildCount.current === 0) { rebuildCount.current++; return; }
    rebuildCount.current++;
    setPageData(null);
    setActivePage(null);
    setPageNotFound(null);
    if (window.location.hash.startsWith('#wiki/')) {
      history.replaceState(null, '', window.location.pathname);
    }
  }, [refreshKey]);

  const openPage = async (slug) => {
    // Strip anchor from slug before API call; keep full slug for hash
    const cleanSlug = slug.split('#')[0];
    setActivePage(cleanSlug);
    setPageNotFound(null);
    const targetHash = `#wiki/${slug}`;
    if (window.location.hash !== targetHash) {
      window.location.hash = targetHash;
    }
    try {
        const data = await api.get(`/wiki/page/${cleanSlug}`);
        setPageData(data);
        setShowPageDetails(false);
      } catch(e) {
        setPageData(null);
        setPageNotFound(cleanSlug);
      // Clear the broken hash so next reload doesn't repeat the 404
      history.replaceState(null, '', window.location.pathname);
    }
  };

  const handleSearch = async (q) => {
    setSearch(q);

      <div className="tab-bar">
        <div className={`tab ${tab==='wiki'?'active':''}`} onClick={()=>setTab('wiki')}>

        <div className={`tab ${tab==='drafts'?'active':''}`} onClick={()=>setTab('drafts')}>
          Черновики
          <span id="draft-badge" className="badge" style={{display:'none'}}>0</span>

      </div>

      {tab === 'conflicts' && <ConflictsPanel />}

        {tab === 'wiki' && (
          <div className="wiki-shell">
            <div className="wiki-toolbar">
              <div className="wiki-stats">
                <div className="wiki-stat">
                  <strong>{tree.total_pages}</strong>
                  <span>страниц</span>
                </div>
                <div className="wiki-stat">
                  <strong>{Object.keys(tree.projects).length}</strong>
                  <span>проектов</span>

                <div className="wiki-stat">

// Chat Message renderer
// ─────────────────────────────────────────────
function Message({ msg, onSlugClick }) {
  // Convert [[slug]] and [[slug|text]] in content to clickable spans
  const renderContent = (text) => {
    const parts = text.split(/(\[\[[^\]]+\]\])/g);
    return parts.map((part, i) => {
      const m = part.match(/^\[\[([^\]|]+)(?:\|([^\]]+))?\]\]$/);
      if (m) {
        const fullSlug = m[1].trim();
        const label = m[2] || fullSlug.split('#')[0].split('/').pop().replace(/-/g, ' ');
        return (
          <span key={i} className="wikilink" onClick={() => onSlugClick(fullSlug)}>
            [[{label}]]
          </span>
        );
      }
      // Simple markdown-ish: **bold**, `code`
      return <span key={i} dangerouslySetInnerHTML={{
        __html: part
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\^\[raw\/([^\]]+)\]/g, (_, rawPath) => `<sup class="provenance"><a href="${buildRawDownloadHref(rawPath)}" title="Source: ${rawPath}">^[${rawPath}]</a></sup>`)
          .replace(/\n/g, '<br/>')
      }} />;
    });
  };

  return (
    <div className={`msg ${msg.role}`}>
      <div className="msg-bubble">
        {renderContent(msg.content)}
        {msg.cited_slugs?.length > 0 && (
          <div className="msg-meta">
            {msg.cited_slugs.map(s => (
              <span key={s} className="tag" style={{cursor:'pointer', color:'var(--accent)'}}
                    onClick={() => onSlugClick(s)}>[[{s}]]</span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// Main App
// ─────────────────────────────────────────────
function App() {
  const toast = React.useContext(ToastCtx);
  const [leftOpen, setLeftOpen] = useState(true);
  const [rightOpen, setRightOpen] = useState(true);
  const [showUpload, setShowUpload] = useState(false);
  const [showRebuild, setShowRebuild] = useState(false);

   // Sessions
   const [sessions, setSessions] = useState([]);
   const [activeSessionId, setActiveSessionId] = useState(null);
   const [messages, setMessages] = useState([]);
   const [isStreaming, setIsStreaming] = useState(false);
   const [refreshKey, setRefreshKey] = useState(0);

   // Clear wiki
   const [showClear, setShowClear] = useState(false);
   const [showAudit, setShowAudit] = useState(false);

   const refreshWiki = useCallback(() => setRefreshKey(k => k + 1), []);

   // Onboarding state
   const [needsOnboarding, setNeedsOnboarding] = useState(true);
   const [onboardingLoaded, setOnboardingLoaded] = useState(false);

  // Chat input
  const [input, setInput] = useState('');
  const [projectFilters, setProjectFilters] = useState([]);
    const [availableProjects, setAvailableProjects] = useState([]);
    const [showProjectDropdown, setShowProjectDropdown] = useState(false);
    const [showManageMenu, setShowManageMenu] = useState(false);
    const projectDropdownRef = useRef();
    const manageMenuRef = useRef();

  // Load projects for filter
  React.useEffect(() => {
    api.get('/wiki/projects').then(r => setAvailableProjects(r.projects || [])).catch(() => {});
  }, [refreshKey]);

  const toggleProjectFilter = (name) => {
    setProjectFilters(prev =>
      prev.includes(name) ? prev.filter(p => p !== name) : [...prev, name]
    );
  };

  const clearProjectFilters = () => setProjectFilters([]);

  // Close dropdown on outside click
  React.useEffect(() => {
      const handler = (e) => {
        if (projectDropdownRef.current && !projectDropdownRef.current.contains(e.target)) {
          setShowProjectDropdown(false);
        }
        if (manageMenuRef.current && !manageMenuRef.current.contains(e.target)) {
          setShowManageMenu(false);
        }
      };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  // Right panel
  const [highlightedSlug, setHighlightedSlug] = useState(null);

  const messagesEndRef = useRef();
  const textareaRef = useRef();

  // ── Session management ──────────────────────

  const loadSessions = async () => {
    try {
      const data = await api.get('/chat/sessions');
      setSessions(data.sessions);
    } catch {}
  };

  useEffect(() => { loadSessions(); }, []);

  // Check onboarding status on mount
  useEffect(() => {
    api.get('/onboarding/status')
      .then(data => { setNeedsOnboarding(data.needs_onboarding); })
      .catch(() => { setNeedsOnboarding(false); });
  }, []);

  const handleSeedDone = () => {
    setNeedsOnboarding(false);
    setOnboardingLoaded(true);
  };

  const newSession = () => {
    const id = crypto.randomUUID?.() ?? 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); });
    setActiveSessionId(id);
    setMessages([]);
  };

  const loadSession = async (id) => {
    setActiveSessionId(id);
    try {
      const data = await api.get(`/chat/sessions/${id}`);
      setMessages(data.messages);
    } catch { setMessages([]); }
  };

  const deleteSession = async (id, e) => {
    e.stopPropagation();
    try {
      await fetch(`/api/chat/sessions/${id}`, {
        method: 'DELETE',
        headers: getAuthHeaders(),
      });
      if (activeSessionId === id) { setActiveSessionId(null); setMessages([]); }
      loadSessions();
    } catch {}
  };

  // ── Scroll to bottom ─────────────────────────

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  // ── Send message ─────────────────────────────

  const send = async () => {
    const q = input.trim();
    if (!q || isStreaming) return;

    let sessionId = activeSessionId;
    if (!sessionId) {
      sessionId = crypto.randomUUID?.() ?? 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); });
      setActiveSessionId(sessionId);
    }

    setInput('');
    setIsStreaming(true);

    // Optimistic user message
    setMessages(m => [...m, { role: 'user', content: q, timestamp: new Date().toISOString(), cited_slugs: [] }]);

    // Add typing indicator
    const typingId = 'typing';
    setMessages(m => [...m, { role: 'assistant', content: '', _typing: true, id: typingId }]);

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({
          session_id: sessionId,
          question: q,
          project_filter: projectFilters.length ? projectFilters : null,
        }),
      });

      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      let fullAnswer = '';
      const cited = [];

      // Replace typing with empty assistant message
      setMessages(m => m.filter(x => !x._typing).concat([{
        role: 'assistant', content: '', timestamp: new Date().toISOString(), cited_slugs: [], _streaming: true
      }]));

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop();
        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          try {
            const ev = JSON.parse(part.slice(6));
            if (ev.type === 'chunk') {
              fullAnswer += ev.content;
              setMessages(m => m.map(x => x._streaming
                ? { ...x, content: fullAnswer } : x));
            } else if (ev.type === 'replace') {
              fullAnswer = ev.content;
              setMessages(m => m.map(x => x._streaming
                ? { ...x, content: fullAnswer, cited_slugs: cited } : x));
            } else if (ev.type === 'cited') {
              cited.push(ev.slug);
              setHighlightedSlug(ev.slug);
              setRightOpen(true);
            } else if (ev.type === 'done') {
              setMessages(m => m.map(x => x._streaming
                ? { ...x, content: fullAnswer, cited_slugs: cited, _streaming: false } : x));
            } else if (ev.type === 'error') {
              toast(`Ошибка: ${ev.message}`, 'error');
            }
          } catch {}
        }
      }
    } catch(e) {
      setMessages(m => m.filter(x => !x._typing && !x._streaming));
      toast(`Ошибка отправки: ${e.message}`, 'error');
    } finally {
      setIsStreaming(false);
      loadSessions();
      if (isMultiUser) refreshCredits();
    }
  };

  const handleKey = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  // ── Crystallize ──────────────────────────────
  const crystallize = async () => {
    if (!activeSessionId) return;
    try {
      const res = await api.post(`/chat/sessions/${activeSessionId}/crystallize`, {});
      toast(res.message, res.slug ? 'success' : 'info');
      if (res.slug) setHighlightedSlug(res.slug);
    } catch(e) { toast(`Ошибка: ${e.message}`, 'error'); }
  };

  // ── Slug click handler ───────────────────────
  const handleSlugClick = useCallback((slug) => {
    setHighlightedSlug(slug);
    setRightOpen(true);
  }, []);

  // ── Render ───────────────────────────────────
  const { authState, refreshCredits } = React.useContext(AuthCtx);
  const isMultiUser = authState.mode === 'multi_user' && authState.user;
  const dailyRemaining = authState.credits?.daily?.remaining ?? 0;
  const welcomeRemaining = authState.credits?.welcome?.remaining ?? 0;
  const totalRemaining = dailyRemaining + welcomeRemaining;
  const showQuotaBanner = isMultiUser && totalRemaining <= 0;

  return (
    <div id="root" style={{display:'flex', flexDirection:'column', height:'100vh'}}>
        {/* Header */}
        <div className="header">
          <div className="app-brand">
            <div className="brand-mark">W</div>
            <div className="brand-copy">
              <strong>Wiki Движок</strong>
              <span>personal knowledge</span>
            </div>
          </div>
          <div className="header-divider" />
          <button className="icon-btn" onClick={() => setLeftOpen(o => !o)} title="История чатов">
            {leftOpen ? '◀' : '▶'}
          </button>
          <div className="spacer" />
          <div className="header-actions">
            {activeSessionId && messages.length >= 6 && (
              <button className="header-btn subtle" onClick={crystallize} title="Сохранить сессию как wiki-страницу">
                Кристаллизовать
              </button>
            )}
            <button className="header-btn primary" onClick={() => setShowUpload(true)}>
              📂 Загрузить
            </button>
            <button className="header-btn subtle" onClick={() => setShowAudit(true)}>
              Аудит
            </button>
            <div className="header-divider" />
            <div className="manage-menu-wrap" ref={manageMenuRef}>
              <button className="header-btn subtle" onClick={() => setShowManageMenu(v => !v)}>
                Управление
              </button>
              {showManageMenu && (
                <div className="manage-menu">
                  <div className="caption">Операции с хранилищем wiki</div>
                  <button onClick={() => { setShowManageMenu(false); setShowRebuild(true); }}>
                    Перестроить из RAW
                  </button>
                  <button className="danger" onClick={() => { setShowManageMenu(false); setShowClear(true); }}>
                    Очистить wiki
                  </button>
                </div>
              )}
            </div>
            <button className="icon-btn" onClick={() => setRightOpen(o => !o)} title="Wiki панель">
              {rightOpen ? '▶' : '◀'}
            </button>
          </div>
          {isMultiUser && <UserMenu />}
        </div>

      {/* Quota exceeded banner */}
      {showQuotaBanner && (
        <div className="quota-banner">
          ⚠️ Токены закончились полностью: ежедневный лимит и приветственный баланс исчерпаны.
          Пополните квоту или дождитесь сброса.
          <span className="spacer" />
          <button className="header-btn" onClick={() => { refreshCredits(); }} style={{fontSize:12, padding:'4px 10px'}}>
            Обновить
          </button>
        </div>
      )}

      <div className="main-area">
        {/* Left Panel — session history */}
        <div className="panel" style={{ width: leftOpen ? `${280}px` : '0' }}>
          <div className="panel-header"><span>💬 История</span></div>
          <button className="btn-new-session" onClick={newSession}>+ Новый чат</button>
          <div className="panel-body">
            {sessions.length === 0 && (
              <div style={{padding:'16px', fontSize:12, color:'var(--text-dim)', textAlign:'center'}}>
                Пока нет сессий
              </div>
            )}
            {sessions.map(s => (
              <div key={s.session_id}
                className={`session-item ${activeSessionId===s.session_id?'active':''}`}
                onClick={() => loadSession(s.session_id)}>
                <div className="s-title">
                  {s.last_question || 'Новая сессия'}
                </div>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <span className="s-meta">
                    {s.message_count} сообщ.
                    {s.project_filter && ` · ${s.project_filter}`}
                  </span>
                  <span className="icon-btn"
                        onClick={e => deleteSession(s.session_id, e)}
                        style={{fontSize:12}}>✕</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Center — chat */}
        <div className="chat-area">
          {messages.length === 0 && (
            needsOnboarding
              ? <WelcomeScreen onDone={handleSeedDone} />
              : <div style={{flex:1, display:'flex', alignItems:'center',
                              justifyContent:'center', flexDirection:'column', gap:12,
                              color:'var(--text-dim)'}}>
                  <div style={{fontSize:40}}>🧠</div>
                  <div style={{fontSize:16, color:'var(--text)'}}>Wiki Движок</div>
                  <div style={{fontSize:13}}>Загрузите документы и задайте вопрос</div>
                  <div style={{display:'flex', gap:8, flexWrap:'wrap', justifyContent:'center',
                                maxWidth:400, marginTop:8}}>
                    {['Что использует этот проект для кеширования?',
                      'Сравни подходы к развёртыванию между проектами',
                      'Покажи все страницы про аутентификацию'].map(hint => (
                      <div key={hint}
                        style={{background:'var(--surface2)', border:'1px solid var(--border)',
                                 borderRadius:8, padding:'6px 12px', fontSize:12,
                                 cursor:'pointer', color:'var(--text-dim)'}}
                        onClick={() => { setInput(hint); textareaRef.current?.focus(); }}>
                        {hint}
                      </div>
                    ))}
                  </div>
                </div>
          )}
          <div className="messages" style={{display: messages.length ? 'flex' : 'none'}}>
            {messages.map((msg, i) => (
              msg._typing
                ? <div key={i} className="msg assistant">
                    <div className="msg-bubble">
                      <div className="typing-indicator">
                        <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
                      </div>
                    </div>
                  </div>
                : <Message key={i} msg={msg} onSlugClick={handleSlugClick} />
            ))}
            <div ref={messagesEndRef} />
          </div>

            <div className="input-bar">
              {projectFilters.length > 0 && (
                <div className="project-filter-row">
                  {projectFilters.map(p => (
                    <span key={p} className="project-chip">
                      {p}
                      <button onClick={() => toggleProjectFilter(p)}>✕</button>
                    </span>
                  ))}
                  <span style={{fontSize:11, color:'var(--text-dim)', cursor:'pointer'}}
                        onClick={clearProjectFilters}>Сбросить</span>
                </div>
              )}
              <div className="composer-card">
                <div className="composer-row">
                  <div className="project-select-wrap" ref={projectDropdownRef}>
                    <button className={`project-badge ${projectFilters.length > 0 ? 'active' : ''}`}
                            onClick={() => setShowProjectDropdown(v => !v)}>
                      <span className="project-badge-copy">
                        <span className="project-badge-label">Проекты</span>
                        <span className="project-badge-value">
                          {projectFilters.length > 0 ? `${projectFilters.length} выбрано` : 'Все проекты'}
                        </span>
                      </span>
                      <span style={{fontSize:10, flexShrink:0}}>▼</span>
                    </button>
                    {showProjectDropdown && (
                      <div className="project-menu">
                        <div className="project-menu-head">
                          <span style={{fontSize:12, fontWeight:600, color:'var(--text)'}}>Фильтр по проекту</span>
                          {projectFilters.length > 0 && (
                            <span style={{fontSize:11, color:'var(--accent)', cursor:'pointer', fontWeight:500}}
                                onClick={clearProjectFilters}>Сбросить</span>
                        )}
                      </div>
                        <div style={{maxHeight:200, overflowY:'auto'}}>
                          {availableProjects.map(p => (
                            <div key={p.name}
                                 onClick={() => toggleProjectFilter(p.name)}
                                 className={`project-option ${projectFilters.includes(p.name) ? 'active' : ''}`}>
                              <div className="project-check">
                                {projectFilters.includes(p.name) && (
                                  <span style={{color:'#fff', fontSize:10, lineHeight:1}}>✓</span>
                                )}
                            </div>
                            <span style={{fontSize:13, color: projectFilters.includes(p.name) ? 'var(--accent)' : 'var(--text)', fontWeight: projectFilters.includes(p.name) ? 500 : 400}}>
                              {p.name}
                            </span>
                            <span style={{fontSize:10, color:'var(--text-dim)', marginLeft:'auto'}}>
                              {p.wiki_pages} wiki
                            </span>
                          </div>
                        ))}
                        {availableProjects.length === 0 && (
                          <div style={{padding:12, fontSize:12, color:'var(--text-dim)', textAlign:'center'}}>
                            Нет проектов
                          </div>
                        )}
                      </div>
                      </div>
                    )}
                  </div>
                  <div className="input-wrap" style={{flex:1}}>
                    <textarea ref={textareaRef}
                      className="chat-input" rows={1}
                      placeholder="Спросите что-нибудь о вашей wiki…"
                      value={input}
                      onChange={e => {
                        setInput(e.target.value);
                        e.target.style.height = 'auto';
                        e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
                      }}
                      onKeyDown={handleKey}
                      disabled={isStreaming}
                    />
                  </div>
                  <button className="send-btn" onClick={send} disabled={isStreaming || !input.trim()}>
                    {isStreaming ? '⏳' : '↑'}
                  </button>
                </div>
              </div>
            </div>
          </div>

        {/* Right Panel — wiki navigation */}
          <div className="panel right" style={{ width: rightOpen ? 'var(--right-panel-w)' : '0' }}>
          <WikiPanel
            highlightedSlug={highlightedSlug}
            onPageOpen={setHighlightedSlug}
            refreshKey={refreshKey}
          />
        </div>
      </div>

      {/* Modals */}
      {showUpload && (
        <UploadModal
          onClose={() => setShowUpload(false)}
          onDone={(results) => { refreshWiki(); if (isMultiUser) refreshCredits(); }}
        />
      )}
      {showRebuild && <RebuildModal onClose={() => setShowRebuild(false)} onRefresh={refreshWiki} />}
      {showClear && <ClearModal onClose={() => setShowClear(false)} onRefresh={refreshWiki} />}
      {showAudit && <AuditModal onClose={() => setShowAudit(false)} />}
    </div>
  );
}

// ─────────────────────────────────────────────
// Mount
// ─────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ToastProvider>
    <AuthProvider>
      <AppWithAuth />
    </AuthProvider>
  </ToastProvider>
);

// ─────────────────────────────────────────────
// App with auth gate
// ─────────────────────────────────────────────
function AppWithAuth() {
  const { authState } = React.useContext(AuthCtx);

  if (authState.loading) {
    return (
      <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', color:'var(--text-dim)'}}>
        <div style={{fontSize:16}}>Загрузка...</div>
      </div>
    );
  }

  // Multi-user mode without authenticated user → show login
  if (authState.mode === 'multi_user' && !authState.user) {
    return <AuthScreen />;
  }

  return <App />;
}
</script>
</body>
</html>
