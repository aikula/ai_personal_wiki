<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki Движок</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F8FA;
      --surface:   #FFFFFF;
      --surface2:  #F0F1F4;
      --border:    #E5E7EB;
      --accent:    #2563EB;
      --accent2:   #4F46E5;
      --text:      #111827;
      --text-dim:  #6B7280;
      --green:     #16A34A;
      --yellow:    #D97706;
      --red:       #DC2626;
      --panel-w:   280px;
      --header-h:  52px;
    }

    body { background: var(--bg); color: var(--text);
           font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }

    /* ── Layout ─────────────────────────────── */
    #root { display: flex; flex-direction: column; height: 100vh; }

    .header {
      height: var(--header-h); background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
      flex-shrink: 0; z-index: 10;
    }
    .header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
    .header .spacer { flex: 1; }
    .header-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-dim); border-radius: 6px;
      padding: 5px 12px; font-size: 13px; cursor: pointer;
      transition: all .15s;
    }
    .header-btn:hover { color: var(--text); border-color: var(--accent); }
    .header-btn.danger:hover { border-color: var(--red); color: var(--red); }

    .main-area { display: flex; flex: 1; overflow: hidden; }

    /* ── Panels ─────────────────────────────── */
    .panel {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
      transition: width .2s ease; overflow: hidden;
    }
    .panel.right { border-right: none; border-left: 1px solid var(--border); }
    .panel.collapsed { width: 0 !important; }
    .panel-header {
      padding: 12px 14px; font-size: 12px; font-weight: 600;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-header span { flex: 1; }
    .panel-body { flex: 1; overflow-y: auto; padding: 8px 0; }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Sessions list ───────────────────────── */
    .session-item {
      padding: 9px 14px; cursor: pointer; border-radius: 6px; margin: 2px 6px;
      font-size: 13px; color: var(--text-dim); transition: all .1s;
      display: flex; flex-direction: column; gap: 2px;
    }
    .session-item:hover, .session-item.active { background: var(--surface2); color: var(--text); }
    .session-item .s-title { font-size: 12px; white-space: nowrap;
                              overflow: hidden; text-overflow: ellipsis; }
    .session-item .s-meta { font-size: 11px; color: var(--text-dim); }
    .btn-new-session {
      margin: 8px; padding: 8px; border-radius: 6px;
      background: var(--accent); color: #fff; border: none;
      font-size: 13px; font-weight: 500; cursor: pointer; width: calc(100% - 16px);
    }
    .btn-new-session:hover { opacity: .9; }

    /* ── Chat center ─────────────────────────── */
    .chat-area {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex;
                flex-direction: column; gap: 16px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); }

    .msg { display: flex; gap: 10px; max-width: 820px; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-bubble {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px;
      font-size: 14px; line-height: 1.6; max-width: 680px;
    }
    .msg.user .msg-bubble { background: var(--accent); border-color: var(--accent);
                              color: #fff; border-radius: 12px 4px 12px 12px; }
    .msg.assistant .msg-bubble { border-radius: 4px 12px 12px 12px; }
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble code { background: rgba(0,0,0,.07); padding: 1px 5px;
                         border-radius: 4px; font-size: 12px; color: var(--text); }
    .msg-bubble pre { background: var(--surface2); padding: 12px; border-radius: 8px;
                       overflow-x: auto; font-size: 12px; border: 1px solid var(--border); }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0;
                         font-size: 13px; }
    .msg-bubble td, .msg-bubble th { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .msg-bubble th { background: var(--surface2); }

    /* wikilinks in answers */
    .wikilink {
      color: var(--accent); text-decoration: none; font-weight: 500;
      padding: 0 2px; border-radius: 3px; border-bottom: 1px solid var(--accent);
      cursor: pointer;
    }
    .wikilink:hover { background: rgba(37,99,235,.08); }

    /* provenance markers */
    .provenance { font-size: 0.75em; vertical-align: super; }
    .provenance a {
      color: var(--text-dim); text-decoration: none; border-bottom: 1px dotted var(--text-dim);
    }
    .provenance a:hover { color: var(--accent); border-bottom-color: var(--accent); }

    .msg-meta { font-size: 11px; color: var(--text-dim); margin-top: 6px;
                 display: flex; gap: 8px; flex-wrap: wrap; }
    .msg-meta .tag { background: var(--surface); border: 1px solid var(--border);
                      border-radius: 3px; padding: 1px 6px; }

    .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
    .typing-dot { width: 6px; height: 6px; background: var(--text-dim);
                   border-radius: 50%; animation: bounce .8s infinite; }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(.8); opacity:.5; }
                         40% { transform: scale(1.2); opacity:1; } }

    /* ── Input bar ───────────────────────────── */
    .input-bar {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--surface); flex-shrink: 0;
    }
    .input-wrap { flex: 1; position: relative; }
    textarea.chat-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 10px; padding: 10px 14px;
      font-size: 14px; resize: none; outline: none; line-height: 1.5;
      max-height: 160px; min-height: 42px; font-family: inherit;
    }
    textarea.chat-input:focus { border-color: var(--accent); }
    .project-badge {
      position: absolute; right: 10px; bottom: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 7px; font-size: 11px; color: var(--text-dim);
      cursor: pointer;
    }
    .send-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; width: 42px; height: 42px; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .15s;
    }
    .send-btn:disabled { opacity: .4; cursor: default; }

    /* ── Wiki tree panel ─────────────────────── */
    .wiki-tree { padding: 8px 8px; }
    .project-section { margin-bottom: 12px; }
    .project-label {
      font-size: 11px; font-weight: 700; color: var(--accent2);
      text-transform: uppercase; letter-spacing: .06em;
      padding: 4px 6px; margin-bottom: 4px;
    }
    .wiki-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; border-radius: 5px; cursor: pointer;
      font-size: 12px; color: var(--text-dim); transition: all .1s;
    }
    .wiki-item:hover { background: var(--surface2); color: var(--text); }
    .wiki-item.active { background: var(--surface2); color: var(--accent); }
    .wiki-item .item-type { font-size: 10px; color: var(--text-dim);
                             background: var(--surface2); border-radius: 3px;
                             padding: 1px 4px; }
    .wiki-item .item-conf { margin-left: auto; font-size: 10px;
                             color: var(--text-dim); }
    .conf-high { color: var(--green) !important; }
    .conf-mid  { color: var(--yellow) !important; }
    .conf-low  { color: var(--red) !important; }
    .wiki-search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 7px 10px;
      font-size: 12px; outline: none; margin: 8px 8px 4px;
      width: calc(100% - 16px);
    }
    .wiki-search-input:focus { border-color: var(--accent); }

    /* ── Page viewer (right panel bottom) ───── */
    .page-viewer {
      border-top: 1px solid var(--border); flex: 1;
      overflow-y: auto; padding: 14px;
    }
    .page-viewer::-webkit-scrollbar { width: 4px; }
    .page-viewer::-webkit-scrollbar-thumb { background: var(--border); }
    .page-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .page-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .page-tag { font-size: 10px; background: var(--surface2);
                 border: 1px solid var(--border); border-radius: 3px; padding: 2px 6px; }
    .page-content { font-size: 13px; line-height: 1.6; color: var(--text-dim); }
    .page-content h1,h2,h3 { color: var(--text); margin: 10px 0 5px; }
    .page-content h2 { font-size: 14px; }
    .page-content h3 { font-size: 13px; }
    .page-content p { margin-bottom: 8px; }
    .page-content code { background: rgba(0,0,0,.06); padding: 1px 4px;
                          border-radius: 3px; font-size: 12px; }
    .page-synopsis {
      margin: 8px 0 12px; padding: 10px 14px;
      background: var(--surface2); border-radius: 6px;
      font-size: 13px; color: var(--text-dim); line-height: 1.5;
      border-left: 3px solid var(--accent);
    }
    .page-content pre { background: var(--surface2); padding: 10px;
                          border-radius: 6px; overflow-x: auto; margin: 6px 0;
                          border: 1px solid var(--border); }
    .page-content table { width: 100%; border-collapse: collapse;
                           font-size: 12px; margin: 6px 0; }
    .page-content th, .page-content td { border: 1px solid var(--border);
                                          padding: 4px 8px; }
    .superseded-banner {
      background: rgba(248,113,113,.1); border: 1px solid var(--red);
      border-radius: 6px; padding: 8px 12px; margin-bottom: 10px;
      font-size: 12px; color: var(--red);
    }

    /* ── Conflicts tab ───────────────────────── */
    .tab-bar {
      display: flex; border-bottom: 1px solid var(--border);
      padding: 0 16px; gap: 0; flex-shrink: 0;
    }
    .tab {
      padding: 10px 16px; font-size: 13px; color: var(--text-dim);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .badge {
      background: var(--red); color: #fff; border-radius: 10px;
      font-size: 10px; padding: 1px 5px; margin-left: 5px;
    }

    .conflict-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; margin: 8px; padding: 12px;
    }
    .conflict-card.open { border-left: 3px solid var(--yellow); }
    .conflict-card.resolved { border-left: 3px solid var(--green); opacity: .7; }
    .conflict-id { font-size: 11px; color: var(--accent); font-weight: 600; }
    .conflict-type { font-size: 11px; color: var(--text-dim); margin: 4px 0; }
    .conflict-ctx {
      background: var(--bg); border-radius: 5px; padding: 8px;
      font-size: 11px; color: var(--text-dim); margin: 6px 0;
      font-family: monospace; white-space: pre-wrap; max-height: 80px;
      overflow: hidden;
    }
    .conflict-options { display: flex; flex-direction: column; gap: 4px; margin: 8px 0; }
    .conflict-option {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 5px; padding: 6px 10px; font-size: 12px;
      cursor: pointer; transition: all .1s;
    }
    .conflict-option:hover { border-color: var(--accent); color: var(--accent); }
    .conflict-option.selected { border-color: var(--accent);
                                  background: rgba(108,138,255,.1); color: var(--accent); }
    .conflict-comment-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 5px; padding: 7px 10px;
      font-size: 12px; outline: none; resize: none; margin-top: 6px;
      font-family: inherit;
    }
    .conflict-comment-input:focus { border-color: var(--accent); }
    .btn-resolve {
      background: var(--green); color: var(--bg); border: none;
      border-radius: 5px; padding: 6px 14px; font-size: 12px;
      font-weight: 600; cursor: pointer; margin-top: 6px; width: 100%;
    }
    .btn-resolve:disabled { opacity: .4; cursor: default; }
    .btn-comment {
      background: transparent; color: var(--text-dim);
      border: 1px solid var(--border); border-radius: 5px;
      padding: 5px 12px; font-size: 12px; cursor: pointer; margin-top: 4px;
      width: 100%;
    }
    .btn-comment:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Upload modal ───────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; width: 460px; max-width: 95vw;
    }
    .modal h2 { font-size: 16px; margin-bottom: 16px; }
    .modal label { font-size: 12px; color: var(--text-dim);
                    display: block; margin-bottom: 5px; }
    .modal input, .modal select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 8px 12px;
      font-size: 13px; outline: none; margin-bottom: 12px;
    }
    .modal input:focus, .modal select:focus { border-color: var(--accent); }
    .dropzone {
      border: 2px dashed var(--border); border-radius: 8px; padding: 24px;
      text-align: center; color: var(--text-dim); font-size: 13px;
      cursor: pointer; transition: all .15s; margin-bottom: 12px;
    }
    .dropzone:hover, .dropzone.drag-over { border-color: var(--accent);
                                             color: var(--accent); }
    .file-list { display: flex; flex-direction: column; gap: 4px;
                  margin-bottom: 12px; max-height: 140px; overflow-y: auto; }
    .file-item { display: flex; align-items: center; gap: 8px;
                  background: var(--surface2); border-radius: 5px;
                  padding: 6px 10px; font-size: 12px; }
    .file-item .fname { flex: 1; color: var(--text); }
    .file-item .fsize { color: var(--text-dim); }
    .file-item .fremove { color: var(--red); cursor: pointer; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel { background: var(--surface2); border: 1px solid var(--border);
                   color: var(--text-dim); border-radius: 6px; padding: 8px 16px;
                   font-size: 13px; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; border: none;
                    border-radius: 6px; padding: 8px 20px; font-size: 13px;
                    font-weight: 600; cursor: pointer; }
    .btn-primary:disabled { opacity: .4; cursor: default; }
    .upload-progress { margin-top: 10px; font-size: 12px; color: var(--text-dim); }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px;
                     margin-top: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent);
                      transition: width .3s; border-radius: 2px; }

    /* ── Rebuild modal ───────────────────────── */
    .rebuild-log {
      background: var(--bg); border-radius: 8px; padding: 12px;
      font-family: monospace; font-size: 12px; height: 200px;
      overflow-y: auto; color: var(--text-dim); margin-top: 12px;
    }
    .rebuild-log .ok   { color: var(--green); }
    .rebuild-log .err  { color: var(--red); }
    .rebuild-log .info { color: var(--accent); }

    /* ── Toasts ──────────────────────────────── */
    .toasts { position: fixed; bottom: 20px; right: 20px;
               display: flex; flex-direction: column; gap: 8px; z-index: 200; }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 16px; font-size: 13px;
      max-width: 320px; animation: slide-in .2s ease;
    }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error   { border-left: 3px solid var(--red); }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes slide-in { from { transform: translateX(20px); opacity:0; }
                           to   { transform: translateX(0);   opacity:1; } }
    .icon-btn { background: none; border: none; cursor: pointer;
                 color: var(--text-dim); font-size: 16px; padding: 4px; }
    .icon-btn:hover { color: var(--text); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────
// API helpers
// ─────────────────────────────────────────────
const api = {
  async get(path) {
    const r = await fetch(`/api${path}`);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(`/api${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async upload(project, files, onProgress) {
    const results = [];
    for (let i = 0; i < files.length; i++) {
      const form = new FormData();
      form.append('project', project);
      form.append('file', files[i]);
      const r = await fetch('/api/ingest', { method: 'POST', body: form });
      const data = await r.json();
      results.push(data);
      onProgress(i + 1, files.length);
    }
    return results;
  },
};

// SSE helper — yields parsed events
function createSSE(path, onEvent, onDone) {
  const ctrl = new AbortController();
  (async () => {
    const r = await fetch(`/api${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: ctrl.signal,
    });
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (part.startsWith('data: ')) {
          try { onEvent(JSON.parse(part.slice(6))); } catch {}
        }
      }
    }
    onDone?.();
  })().catch(() => {});
  return () => ctrl.abort();
}

// ─────────────────────────────────────────────
// Toast context
// ─────────────────────────────────────────────
const ToastCtx = React.createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div className="toasts">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}

// ─────────────────────────────────────────────
// Upload Modal
// ─────────────────────────────────────────────
function UploadModal({ onClose, onDone }) {
  const toast = React.useContext(ToastCtx);
  const [project, setProject] = useState('_general');
  const [files, setFiles] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState([0, 0]);
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef();

  const addFiles = fs => {
    const mds = [...fs].filter(f => f.name.endsWith('.md'));
    if (mds.length < fs.length) toast('Принимаются только .md файлы', 'error');
    setFiles(prev => [...prev, ...mds]);
  };

  const handleDrop = e => {
    e.preventDefault(); setDragOver(false);
    addFiles(e.dataTransfer.files);
  };

  const upload = async () => {
    if (!files.length) return;
    setUploading(true);
    try {
      const results = await api.upload(project, files, (cur, tot) =>
        setProgress([cur, tot])
      );
      const ok = results.filter(r => r.success).length;
      const conflicts = results.flatMap(r => r.conflict_ids || []).length;
      toast(`Загружено ${ok}/${files.length} файлов${conflicts ? `, конфликтов: ${conflicts}` : ''}`, 'success');
      onDone?.(results);
      onClose();
    } catch(e) {
      toast(`Ошибка загрузки: ${e.message}`, 'error');
    } finally {
      setUploading(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h2>📂 Загрузка документов</h2>
        <label>Проект</label>
        <input value={project} onChange={e => setProject(e.target.value)}
               placeholder="_general или название проекта" />
        <div
          className={`dropzone ${dragOver ? 'drag-over' : ''}`}
          onClick={() => inputRef.current.click()}
          onDrop={handleDrop}
          onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
        >
          Перетащите .md файлы сюда или нажмите для выбора
          <input ref={inputRef} type="file" accept=".md" multiple hidden
                 onChange={e => addFiles(e.target.files)} />
        </div>
        {files.length > 0 && (
          <div className="file-list">
            {files.map((f, i) => (
              <div key={i} className="file-item">
                <span className="fname">{f.name}</span>
                <span className="fsize">{Math.round(f.size/1024)}KB</span>
                <span className="fremove"
                      onClick={() => setFiles(fs => fs.filter((_,j)=>j!==i))}>✕</span>
              </div>
            ))}
          </div>
        )}
        {uploading && (
          <div className="upload-progress">
            Обработка {progress[0]}/{progress[1]}...
            <div className="progress-bar">
              <div className="progress-fill"
                   style={{width: `${progress[1] ? (progress[0]/progress[1]*100) : 0}%`}} />
            </div>
          </div>
        )}
        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose}>Отмена</button>
          <button className="btn-primary" onClick={upload}
                  disabled={!files.length || uploading}>
            {uploading ? 'Загрузка…' : `Загрузить ${files.length} файл(ов)`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// Rebuild Modal
// ─────────────────────────────────────────────
function RebuildModal({ onClose, onRefresh }) {
  const toast = React.useContext(ToastCtx);
  const [running, setRunning] = useState(false);
  const [log, setLog] = useState([]);
  const [done, setDone] = useState(false);
  const logRef = useRef();

  const addLog = (text, cls = '') => {
    setLog(l => [...l, { text, cls }]);
    setTimeout(() => logRef.current?.scrollTo(0, 99999), 50);
  };

  const run = async () => {
    setRunning(true); setLog([]); setDone(false);
    addLog('Начало перестройки с нуля…', 'info');
    try {
      const stop = createSSE(
        '/ingest/rebuild',
        ev => {
          if (ev.status === 'processing') {
            addLog(`[${ev.current}/${ev.total}] ${ev.filename}`);
          } else if (ev.status === 'complete') {
            const r = ev.result;
            addLog(`Готово: ${r.success}✓ ${r.failed}✗ ${r.conflict_ids?.length||0} конфликтов`, 'ok');
            if (r.errors?.length) r.errors.forEach(e => addLog(`  ✗ ${e.file}: ${e.error}`, 'err'));
            setDone(true);
          } else if (ev.status === 'failed') {
            addLog(`Ошибка: ${JSON.stringify(ev)}`, 'err');
          }
        },
        () => setRunning(false)
      );
    } catch(e) {
      addLog(`Ошибка: ${e.message}`, 'err');
      setRunning(false);
    }
  };

  // POST trigger (SSE needs body)
  const handleRun = async () => {
    setRunning(true); setLog([]); setDone(false);
    addLog('Начало перестройки…', 'info');
    const r = await fetch('/api/ingest/rebuild', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ confirm: true }),
    });
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done: d, value } = await reader.read();
      if (d) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(part.slice(6));
          if (ev.status === 'processing') addLog(`[${ev.current}/${ev.total}] ${ev.filename}`);
          else if (ev.status === 'complete') {
            const res = ev.result;
            addLog(`Готово: ${res.success}✓  ${res.failed}✗  конфликтов: ${res.conflict_ids?.length||0}`, 'ok');
            res.errors?.forEach(e => addLog(`  ✗ ${e.file}: ${e.error}`, 'err'));
            setDone(true);
            if (onRefresh) onRefresh();
          }
        } catch {}
      }
    }
    setRunning(false);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && !running && onClose()}>
      <div className="modal">
        <h2>🔄 Перестройка Wiki из RAW</h2>
        <p style={{fontSize:13, color:'var(--red)', marginBottom:12}}>
          ⚠️ Это УДАЛИТ все wiki-страницы и перестроит их с нуля.
          Исходные файлы и skills.md будут сохранены.
        </p>
        <div className="rebuild-log" ref={logRef}>
          {log.map((l,i) => <div key={i} className={l.cls}>{l.text}</div>)}
          {!log.length && <span>Нажмите «Запустить перестройку» для начала.</span>}
        </div>
        <div className="modal-actions" style={{marginTop:12}}>
          <button className="btn-cancel" onClick={onClose} disabled={running}>Закрыть</button>
          <button className="btn-primary danger" onClick={handleRun}
                  disabled={running || done}
                  style={{background: done ? 'var(--green)' : 'var(--red)'}}>
            {running ? 'Перестройка…' : done ? 'Завершено ✓' : 'Запустить перестройку'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// Conflicts Panel
// ─────────────────────────────────────────────
function ConflictsPanel() {
  const toast = React.useContext(ToastCtx);
  const [data, setData] = useState({ open: [], resolved: [], total_open: 0 });
  const [tab, setTab] = useState('open');
  const [resolving, setResolving] = useState({});
  const [selections, setSelections] = useState({});
  const [comments, setComments] = useState({});
  const [addingComment, setAddingComment] = useState({});

  const load = async () => {
    try { setData(await api.get('/conflicts')); } catch {}
  };
  useEffect(() => { load(); }, []);

  const resolve = async (id) => {
    const choice = selections[id];
    if (!choice) return;
    setResolving(r => ({...r, [id]: true}));
    try {
      const res = await api.post(`/conflicts/${id}/resolve`, {
        resolution: choice,
        user_comment: comments[id] || '',
        extract_skill: true,
      });
      toast(res.message, 'success');
      await load();
    } catch(e) {
      toast(`Ошибка: ${e.message}`, 'error');
    } finally {
      setResolving(r => ({...r, [id]: false}));
    }
  };

  const addComment = async (id) => {
    const comment = comments[id];
    if (!comment?.trim()) return;
    try {
      await api.post(`/conflicts/${id}/comment`, { comment });
      toast('Комментарий добавлен', 'success');
      setAddingComment(a => ({...a, [id]: false}));
      setComments(c => ({...c, [id]: ''}));
    } catch(e) {
      toast(`Ошибка: ${e.message}`, 'error');
    }
  };

  const list = tab === 'open' ? data.open : data.resolved;

  return (
    <div style={{display:'flex', flexDirection:'column', flex:1, overflow:'hidden'}}>
      <div className="tab-bar">
        <div className={`tab ${tab==='open'?'active':''}`} onClick={()=>setTab('open')}>
          Открытые {data.total_open > 0 && <span className="badge">{data.total_open}</span>}
        </div>
        <div className={`tab ${tab==='resolved'?'active':''}`} onClick={()=>setTab('resolved')}>
          Решённые ({data.resolved.length})
        </div>
      </div>
      <div style={{flex:1, overflowY:'auto'}}>
        {list.length === 0 && (
          <div style={{padding:24, textAlign:'center', color:'var(--text-dim)', fontSize:13}}>
            {tab==='open' ? '✓ Нет открытых конфликтов' : 'Нет решённых конфликтов'}
          </div>
        )}
        {list.map(c => (
          <div key={c.id} className={`conflict-card ${c.status.toLowerCase()}`}>
            <div className="conflict-id">{c.id}</div>
            <div className="conflict-type">
              {c.conflict_type} · {c.project} · {c.date}
            </div>
            <div style={{fontSize:11, color:'var(--text-dim)', margin:'4px 0'}}>
              <span style={{color:'var(--accent)'}}>[[{c.page_a_slug}]]</span>
              {' vs '}<span style={{color:'var(--accent2)'}}>{c.page_b_ref}</span>
            </div>
            {c.description && (
              <div style={{
                background:'rgba(255,165,0,0.08)', border:'1px solid rgba(255,165,0,0.25)',
                borderRadius:6, padding:'8px 12px', marginBottom:8, fontSize:12,
                color:'var(--text)', lineHeight:1.5,
              }}>
                <span style={{color:'#f90', fontWeight:600, marginRight:6}}>⚠ Суть конфликта:</span>
                {c.description}
              </div>
            )}
            {(c.context_a || c.context_b) && (
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:8}}>
                {c.context_a && (
                  <div style={{background:'rgba(100,149,237,0.08)', borderLeft:'3px solid var(--accent)', padding:'6px 10px', borderRadius:4}}>
                    <div style={{fontSize:10, color:'var(--accent)', fontWeight:600, marginBottom:4}}>
                      📄 В ВИКИ [[{c.page_a_slug}]]
                    </div>
                    <div style={{fontSize:11, color:'var(--text-dim)', lineHeight:1.5, whiteSpace:'pre-wrap'}}>
                      {c.context_a}
                    </div>
                  </div>
                )}
                {c.context_b && (
                  <div style={{background:'rgba(255,100,100,0.08)', borderLeft:'3px solid var(--accent2)', padding:'6px 10px', borderRadius:4}}>
                    <div style={{fontSize:10, color:'var(--accent2)', fontWeight:600, marginBottom:4}}>
                      📥 ИЗ ИСТОЧНИКА {c.source_file}
                    </div>
                    <div style={{fontSize:11, color:'var(--text-dim)', lineHeight:1.5, whiteSpace:'pre-wrap'}}>
                      {c.context_b}
                    </div>
                  </div>
                )}
              </div>
            )}

            {c.status === 'OPEN' && (
              <>
                {c.suggested_options.length > 0 && (
                  <div className="conflict-options">
                    {c.suggested_options.map((opt, i) => (
                      <div key={i}
                        className={`conflict-option ${selections[c.id]===opt?'selected':''}`}
                        onClick={() => setSelections(s => ({...s, [c.id]: opt}))}>
                        {opt}
                      </div>
                    ))}
                  </div>
                )}
                <textarea className="conflict-comment-input" rows={2}
                  placeholder="Ваш комментарий или указание (обязательно для извлечения навыка)…"
                  value={comments[c.id] || ''}
                  onChange={e => setComments(cm => ({...cm, [c.id]: e.target.value}))} />
                <button className="btn-resolve"
                  disabled={!selections[c.id] || resolving[c.id]}
                  onClick={() => resolve(c.id)}>
                  {resolving[c.id] ? 'Решение…' : '✓ Решить и извлечь навык'}
                </button>
                <button className="btn-comment"
                  onClick={() => addComment(c.id)}>
                  + Добавить комментарий (оставить открытым)
                </button>
              </>
            )}
            {c.status === 'RESOLVED' && (
              <div style={{fontSize:11, color:'var(--green)', marginTop:6}}>
                ✓ {c.resolution}
                {c.skill_extracted && (
                  <div style={{color:'var(--text-dim)', marginTop:3}}>
                    Навык: {c.skill_extracted}
                  </div>
                )}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// Drafts Panel
// ─────────────────────────────────────────────
function DraftsPanel() {
  const [drafts, setDrafts] = useState([]);
  const [loading, setLoading] = useState(true);
  const toast = React.useContext(ToastCtx);

  const loadDrafts = async () => {
    setLoading(true);
    try {
      const data = await api.get('/ingest/drafts');
      setDrafts(data.drafts);
    } catch { setDrafts([]); }
    setLoading(false);
  };

  useEffect(() => { loadDrafts(); }, []);

  const handleApply = async (id) => {
    try {
      const r = await api.post(`/ingest/drafts/${id}/apply`);
      if (r.status === 'applied') {
        toast.success(`Применено: ${r.pages.join(', ')}`);
        loadDrafts();
      }
    } catch(e) {
      toast.error(`Ошибка применения: ${e.message || 'неизвестная ошибка'}`);
    }
  };

  const handleReject = async (id) => {
    try {
      await api.post(`/ingest/drafts/${id}/reject`);
      toast.success('Черновик отклонён');
      loadDrafts();
    } catch { toast.error('Ошибка отклонения'); }
  };

  if (loading) return <div className="panel-hint">Загрузка черновиков...</div>;

  return (
    <div className="conflicts-panel">
      {drafts.length === 0 && <div className="panel-hint">Нет ожидающих черновиков.</div>}
      {drafts.map(d => (
        <div key={d.id} className="conflict-card" style={{marginBottom:8}}>
          <div style={{fontWeight:600, marginBottom:4}}>{d.id}</div>
          <div style={{fontSize:12, color:'var(--text-dim)', marginBottom:6}}>
            {d.plan_summary} &middot; {d.pages?.length || 0} pages
            &middot; {d.diff_count || 0} diffs
          </div>
          {d.pages?.length > 0 && (
            <div style={{fontSize:11, marginBottom:6}}>
              {d.pages.map(p => (
                <span key={p} className="page-tag">{p}</span>
              ))}
            </div>
          )}
          <div style={{display:'flex', gap:6}}>
            <button className="header-btn" onClick={() => handleApply(d.id)}
                    style={{color:'var(--green)', borderColor:'var(--green)'}}>
              Применить
            </button>
            <button className="header-btn danger" onClick={() => handleReject(d.id)}>
              Отклонить
            </button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────
// Wiki Tree + Page Viewer (Right Panel)
// ─────────────────────────────────────────────
function WikiPanel({ highlightedSlug, onPageOpen, refreshKey }) {
  const [tree, setTree] = useState({ projects: {}, total_pages: 0, open_conflicts: 0 });
  const [search, setSearch] = useState('');
  const [searchResults, setSearchResults] = useState(null);
  const [activePage, setActivePage] = useState(null);
  const [pageData, setPageData] = useState(null);
  const [pageNotFound, setPageNotFound] = useState(null);
  const [tab, setTab] = useState('wiki'); // 'wiki' | 'conflicts'

  const loadTree = async () => {
    try { setTree(await api.get('/wiki/tree')); } catch {}
  };
  useEffect(() => { loadTree(); }, [refreshKey]);

  // Open highlighted slug from chat citation
  useEffect(() => {
    if (highlightedSlug) openPage(highlightedSlug);
  }, [highlightedSlug]);

  // Hash routing: #wiki/project/page → openPage
  useEffect(() => {
    const onHash = () => {
      const hash = window.location.hash;
      if (!hash.startsWith('#wiki/')) return;
      const slug = hash.slice(6); // remove '#wiki/'
      if (slug) openPage(slug);
    };
    window.addEventListener('hashchange', onHash);
    // Handle existing hash on mount
    onHash();
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // When wiki is rebuilt (refreshKey changes), clear the stale open page.
  // Skip on initial mount (refreshKey=0) to allow hash routing to work.
  const rebuildCount = React.useRef(0);
  useEffect(() => {
    if (rebuildCount.current === 0) { rebuildCount.current++; return; }
    rebuildCount.current++;
    setPageData(null);
    setActivePage(null);
    setPageNotFound(null);
    if (window.location.hash.startsWith('#wiki/')) {
      history.replaceState(null, '', window.location.pathname);
    }
  }, [refreshKey]);

  const openPage = async (slug) => {
    // Strip anchor from slug before API call; keep full slug for hash
    const cleanSlug = slug.split('#')[0];
    setActivePage(cleanSlug);
    setPageNotFound(null);
    const targetHash = `#wiki/${slug}`;
    if (window.location.hash !== targetHash) {
      window.location.hash = targetHash;
    }
    try {
      const data = await api.get(`/wiki/page/${cleanSlug}`);
      setPageData(data);
    } catch(e) {
      setPageData(null);
      setPageNotFound(cleanSlug);
      // Clear the broken hash so next reload doesn't repeat the 404
      history.replaceState(null, '', window.location.pathname);
    }
  };

  const handleSearch = async (q) => {
    setSearch(q);
    if (!q.trim()) { setSearchResults(null); return; }
    try {
      const res = await api.get(`/wiki/search?q=${encodeURIComponent(q)}`);
      setSearchResults(res.results);
    } catch {}
  };

  const confClass = conf =>
    conf >= 0.8 ? 'conf-high' : conf >= 0.5 ? 'conf-mid' : 'conf-low';

  const renderTree = () => {
    const items = searchResults
      ? searchResults.map(r => ({...r, type: 'entity'}))
      : null;

    if (items) return (
      <div className="wiki-tree">
        {items.length === 0 && (
          <div style={{padding:12, color:'var(--text-dim)', fontSize:12}}>Нет результатов</div>
        )}
        {items.map(item => (
          <div key={item.slug}
            className={`wiki-item ${activePage===item.slug?'active':''}`}
            onClick={() => openPage(item.slug)}>
            <span style={{flex:1, overflow:'hidden', textOverflow:'ellipsis',
                           whiteSpace:'nowrap'}}>{item.title || item.slug}</span>
            <span style={{fontSize:10, color:'var(--text-dim)'}}>{item.project}</span>
          </div>
        ))}
      </div>
    );

    return (
      <div className="wiki-tree">
        {Object.entries(tree.projects).sort().map(([proj, pages]) => (
          <div key={proj} className="project-section">
            <div className="project-label">📁 {proj} ({pages.length})</div>
            {pages.map(p => (
              <div key={p.slug}
                className={`wiki-item ${activePage===p.slug?'active':''}`}
                onClick={() => openPage(p.slug)}>
                <span style={{flex:1, overflow:'hidden', textOverflow:'ellipsis',
                               whiteSpace:'nowrap'}}>{p.title}</span>
                <span className={`item-conf ${confClass(p.confidence)}`}>
                  {Math.round(p.confidence*100)}%
                </span>
              </div>
            ))}
          </div>
        ))}
        {Object.keys(tree.projects).length === 0 && (
          <div style={{padding:16, color:'var(--text-dim)', fontSize:12, textAlign:'center'}}>
            Wiki пусто. Загрузите документы для начала работы.
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{display:'flex', flexDirection:'column', flex:1, overflow:'hidden'}}>
      <div className="tab-bar">
        <div className={`tab ${tab==='wiki'?'active':''}`} onClick={()=>setTab('wiki')}>
          Wiki ({tree.total_pages})
        </div>
        <div className={`tab ${tab==='conflicts'?'active':''}`} onClick={()=>setTab('conflicts')}>
          Конфликты
          {tree.open_conflicts > 0 && <span className="badge">{tree.open_conflicts}</span>}
        </div>
        <div className={`tab ${tab==='drafts'?'active':''}`} onClick={()=>setTab('drafts')}>
          Черновики
          <span id="draft-badge" className="badge" style={{display:'none'}}>0</span>
        </div>
      </div>

      {tab === 'conflicts' && <ConflictsPanel />}
      {tab === 'drafts' && <DraftsPanel />}

      {tab === 'wiki' && (
        <>
          <input className="wiki-search-input" placeholder="🔍 Поиск по wiki…"
                 value={search} onChange={e => handleSearch(e.target.value)} />
          <div style={{flex: pageData ? '0 0 40%' : '1', overflowY:'auto',
                        borderBottom: pageData ? '1px solid var(--border)' : 'none'}}>
            {renderTree()}
          </div>

          {pageData && (
            <div className="page-viewer" style={{flex:1}}>
              {pageData.superseded_by && (
                  <div className="superseded-banner">
                    ⚠️ Заменено на{' '}
                  <span className="wikilink" onClick={() => openPage(pageData.superseded_by)}>
                    [[{pageData.superseded_by}]]
                  </span>
                </div>
              )}
              <div className="page-title">{pageData.title}</div>
              <div className="page-meta">
                <span className="page-tag">{pageData.project}</span>
                <span className="page-tag">{pageData.page_type}</span>
                <span className={`page-tag ${confClass(pageData.confidence)}`}>
                  уверенность: {Math.round(pageData.confidence*100)}%
                </span>
                {pageData.tags.map(t => (
                  <span key={t} className="page-tag">{t}</span>
                ))}
              </div>
              {pageData.synopsis && (
                <div className="page-synopsis">{pageData.synopsis}</div>
              )}
              {(pageData.needs_review || pageData.source_coverage || pageData.wikilinks?.length > 0) && (
                <div className="page-meta" style={{marginBottom:8}}>
                  {pageData.needs_review && <span className="page-tag" style={{color:'var(--red)', borderColor:'var(--red)'}}>требует проверки</span>}
                  {pageData.source_coverage && <span className="page-tag">{pageData.source_coverage} покрытие</span>}
                  {pageData.wikilinks?.length > 0 && <span className="page-tag">{pageData.wikilinks.length} → ссылок</span>}
                </div>
              )}
              <div className="page-content"
                   dangerouslySetInnerHTML={{ __html: pageData.content_html }}
                   onClick={e => {
                     const target = e.target;
                     const base = target instanceof Element ? target : target.parentElement;
                     const a = base ? base.closest('a.wikilink') : null;
                     if (a) {

                       const targetSlug = href.replace('#wiki/', '');
                       if (targetSlug) openPage(targetSlug);

          {!pageData && pageNotFound && (

              alignItems:'center', justifyContent:'center', gap:12, color:'var(--text-dim)'}}>

          {!pageData && pageNotFound && (

              alignItems:'center', justifyContent:'center', gap:12, color:'var(--text-dim)'}}>
              <div style={{fontSize:32}}>📄</div>
              <div style={{fontSize:14, color:'var(--text)'}}>Страница не найдена</div>
              <div style={{fontSize:12}}>{pageNotFound}</div>
              <div style={{fontSize:12}}>Эта страница указана в [[wikilink]], но ещё не создана.</div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// Chat Message renderer
// ─────────────────────────────────────────────
function Message({ msg, onSlugClick }) {
  // Convert [[slug]] and [[slug|text]] in content to clickable spans
  const renderContent = (text) => {
    const parts = text.split(/(\[\[[^\]]+\]\])/g);
    return parts.map((part, i) => {
      const m = part.match(/^\[\[([^\]|]+)(?:\|([^\]]+))?\]\]$/);
      if (m) {
        const fullSlug = m[1].trim();
        const label = m[2] || fullSlug.split('#')[0].split('/').pop().replace(/-/g, ' ');
        return (
          <span key={i} className="wikilink" onClick={() => onSlugClick(fullSlug)}>
            [[{label}]]
          </span>
        );
      }
      // Simple markdown-ish: **bold**, `code`
      return <span key={i} dangerouslySetInnerHTML={{
        __html: part
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\^\[raw\/([^\]]+)\]/g, '<sup class="provenance"><a href="/api/wiki/raw/$1" title="Source: $1">^[$1]</a></sup>')
          .replace(/\n/g, '<br/>')
      }} />;
    });
  };

  return (
    <div className={`msg ${msg.role}`}>
      <div className="msg-bubble">
        {renderContent(msg.content)}
        {msg.cited_slugs?.length > 0 && (
          <div className="msg-meta">
            {msg.cited_slugs.map(s => (
              <span key={s} className="tag" style={{cursor:'pointer', color:'var(--accent)'}}
                    onClick={() => onSlugClick(s)}>[[{s}]]</span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// Main App
// ─────────────────────────────────────────────
function App() {
  const toast = React.useContext(ToastCtx);
  const [leftOpen, setLeftOpen] = useState(true);
  const [rightOpen, setRightOpen] = useState(true);
  const [showUpload, setShowUpload] = useState(false);
  const [showRebuild, setShowRebuild] = useState(false);

  // Sessions
  const [sessions, setSessions] = useState([]);
  const [activeSessionId, setActiveSessionId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [isStreaming, setIsStreaming] = useState(false);
  const [refreshKey, setRefreshKey] = useState(0);

  const refreshWiki = useCallback(() => setRefreshKey(k => k + 1), []);

  // Chat input
  const [input, setInput] = useState('');
  const [projectFilter, setProjectFilter] = useState(null);

  // Right panel
  const [highlightedSlug, setHighlightedSlug] = useState(null);

  const messagesEndRef = useRef();
  const textareaRef = useRef();

  // ── Session management ──────────────────────

  const loadSessions = async () => {
    try {
      const data = await api.get('/chat/sessions');
      setSessions(data.sessions);
    } catch {}
  };

  useEffect(() => { loadSessions(); }, []);

  const newSession = () => {
    const id = crypto.randomUUID();
    setActiveSessionId(id);
    setMessages([]);
  };

  const loadSession = async (id) => {
    setActiveSessionId(id);
    try {
      const data = await api.get(`/chat/sessions/${id}`);
      setMessages(data.messages);
    } catch { setMessages([]); }
  };

  const deleteSession = async (id, e) => {
    e.stopPropagation();
    try {
      await fetch(`/api/chat/sessions/${id}`, { method: 'DELETE' });
      if (activeSessionId === id) { setActiveSessionId(null); setMessages([]); }
      loadSessions();
    } catch {}
  };

  // ── Scroll to bottom ─────────────────────────

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  // ── Send message ─────────────────────────────

  const send = async () => {
    const q = input.trim();
    if (!q || isStreaming) return;

    let sessionId = activeSessionId;
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      setActiveSessionId(sessionId);
    }

    setInput('');
    setIsStreaming(true);

    // Optimistic user message
    setMessages(m => [...m, { role: 'user', content: q, timestamp: new Date().toISOString(), cited_slugs: [] }]);

    // Add typing indicator
    const typingId = 'typing';
    setMessages(m => [...m, { role: 'assistant', content: '', _typing: true, id: typingId }]);

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          question: q,
          project_filter: projectFilter,
        }),
      });

      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      let fullAnswer = '';
      const cited = [];

      // Replace typing with empty assistant message
      setMessages(m => m.filter(x => !x._typing).concat([{
        role: 'assistant', content: '', timestamp: new Date().toISOString(), cited_slugs: [], _streaming: true
      }]));

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop();
        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          try {
            const ev = JSON.parse(part.slice(6));
            if (ev.type === 'chunk') {
              fullAnswer += ev.content;
              setMessages(m => m.map(x => x._streaming
                ? { ...x, content: fullAnswer } : x));
            } else if (ev.type === 'cited') {
              cited.push(ev.slug);
              setHighlightedSlug(ev.slug);
              setRightOpen(true);
            } else if (ev.type === 'done') {
              setMessages(m => m.map(x => x._streaming
                ? { ...x, content: fullAnswer, cited_slugs: cited, _streaming: false } : x));
            } else if (ev.type === 'error') {
              toast(`Ошибка: ${ev.message}`, 'error');
            }
          } catch {}
        }
      }
    } catch(e) {
      setMessages(m => m.filter(x => !x._typing && !x._streaming));
      toast(`Ошибка отправки: ${e.message}`, 'error');
    } finally {
      setIsStreaming(false);
      loadSessions();
    }
  };

  const handleKey = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  // ── Crystallize ──────────────────────────────
  const crystallize = async () => {
    if (!activeSessionId) return;
    try {
      const res = await api.post(`/chat/sessions/${activeSessionId}/crystallize`, {});
      toast(res.message, res.slug ? 'success' : 'info');
      if (res.slug) setHighlightedSlug(res.slug);
    } catch(e) { toast(`Ошибка: ${e.message}`, 'error'); }
  };

  // ── Slug click handler ───────────────────────
  const handleSlugClick = useCallback((slug) => {
    setHighlightedSlug(slug);
    setRightOpen(true);
  }, []);

  // ── Render ───────────────────────────────────

  return (
    <div id="root" style={{display:'flex', flexDirection:'column', height:'100vh'}}>
      {/* Header */}
      <div className="header">
        <button className="icon-btn" onClick={() => setLeftOpen(o => !o)} title="Переключить историю">
          {leftOpen ? '◀' : '▶'}
        </button>
        <h1>🧠 Wiki Движок</h1>
        <div className="spacer" />
        {activeSessionId && messages.length >= 6 && (
          <button className="header-btn" onClick={crystallize} title="Сохранить сессию как wiki-страницу">
            💎 Кристаллизовать
          </button>
        )}
        <button className="header-btn" onClick={() => setShowUpload(true)}>
          📂 Загрузить
        </button>
        <button className="header-btn danger" onClick={() => setShowRebuild(true)}>
          🔄 Перестроить
        </button>
        <button className="icon-btn" onClick={() => setRightOpen(o => !o)} title="Переключить wiki">
          {rightOpen ? '▶' : '◀'}
        </button>
      </div>

      <div className="main-area">
        {/* Left Panel — session history */}
        <div className="panel" style={{ width: leftOpen ? `${280}px` : '0' }}>
          <div className="panel-header"><span>💬 История</span></div>
          <button className="btn-new-session" onClick={newSession}>+ Новый чат</button>
          <div className="panel-body">
            {sessions.length === 0 && (
              <div style={{padding:'16px', fontSize:12, color:'var(--text-dim)', textAlign:'center'}}>
                Пока нет сессий
              </div>
            )}
            {sessions.map(s => (
              <div key={s.session_id}
                className={`session-item ${activeSessionId===s.session_id?'active':''}`}
                onClick={() => loadSession(s.session_id)}>
                <div className="s-title">
                  {s.last_question || 'Новая сессия'}
                </div>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <span className="s-meta">
                    {s.message_count} сообщ.
                    {s.project_filter && ` · ${s.project_filter}`}
                  </span>
                  <span className="icon-btn"
                        onClick={e => deleteSession(s.session_id, e)}
                        style={{fontSize:12}}>✕</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Center — chat */}
        <div className="chat-area">
          {messages.length === 0 && (
            <div style={{flex:1, display:'flex', alignItems:'center',
                          justifyContent:'center', flexDirection:'column', gap:12,
                          color:'var(--text-dim)'}}>
              <div style={{fontSize:40}}>🧠</div>
              <div style={{fontSize:16, color:'var(--text)'}}>Wiki Движок</div>
              <div style={{fontSize:13}}>Загрузите документы и задайте вопрос</div>
              <div style={{display:'flex', gap:8, flexWrap:'wrap', justifyContent:'center',
                            maxWidth:400, marginTop:8}}>
                {['Что использует этот проект для кеширования?',
                  'Сравни подходы к развёртыванию между проектами',
                  'Покажи все страницы про аутентификацию'].map(hint => (
                  <div key={hint}
                    style={{background:'var(--surface2)', border:'1px solid var(--border)',
                             borderRadius:8, padding:'6px 12px', fontSize:12,
                             cursor:'pointer', color:'var(--text-dim)'}}
                    onClick={() => { setInput(hint); textareaRef.current?.focus(); }}>
                    {hint}
                  </div>
                ))}
              </div>
            </div>
          )}
          <div className="messages" style={{display: messages.length ? 'flex' : 'none'}}>
            {messages.map((msg, i) => (
              msg._typing
                ? <div key={i} className="msg assistant">
                    <div className="msg-bubble">
                      <div className="typing-indicator">
                        <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
                      </div>
                    </div>
                  </div>
                : <Message key={i} msg={msg} onSlugClick={handleSlugClick} />
            ))}
            <div ref={messagesEndRef} />
          </div>

          <div className="input-bar">
            <div className="input-wrap">
              <textarea ref={textareaRef}
                className="chat-input" rows={1}
                placeholder="Спросите что-нибудь о вашей wiki… (Enter для отправки, Shift+Enter для новой строки)"
                value={input}
                onChange={e => {
                  setInput(e.target.value);
                  e.target.style.height = 'auto';
                  e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
                }}
                onKeyDown={handleKey}
                disabled={isStreaming}
              />
              <span className="project-badge"
                    onClick={() => {
                      const p = prompt('Фильтр по проекту (пусто = все):', projectFilter || '');
                      if (p !== null) setProjectFilter(p || null);
                    }}>
                {projectFilter || 'все проекты'}
              </span>
            </div>
            <button className="send-btn" onClick={send} disabled={isStreaming || !input.trim()}>
              {isStreaming ? '⏳' : '↑'}
            </button>
          </div>
        </div>

        {/* Right Panel — wiki navigation */}
        <div className="panel right" style={{ width: rightOpen ? `${320}px` : '0' }}>
          <WikiPanel
            highlightedSlug={highlightedSlug}
            onPageOpen={setHighlightedSlug}
            refreshKey={refreshKey}
          />
        </div>
      </div>

      {/* Modals */}
      {showUpload && (
        <UploadModal
          onClose={() => setShowUpload(false)}
          onDone={refreshWiki}
        />
      )}
      {showRebuild && <RebuildModal onClose={() => setShowRebuild(false)} onRefresh={refreshWiki} />}
    </div>
  );
}

// ─────────────────────────────────────────────
// Mount
// ─────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ToastProvider>
    <App />
  </ToastProvider>
);
</script>
</body>
</html>
