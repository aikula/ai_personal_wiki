# config/settings.yaml
# Значения по умолчанию. Env vars имеют приоритет над yaml.

language: "ru"

app:
  mode: "personal_local"  # personal_local | personal_server | multi_user

control:
  db_url: "sqlite:///data/control.db"
  workspaces_root: "data/workspaces"

multi_user:
  registration_enabled: true
  default_daily_tokens: 30000
  default_welcome_tokens: 200000
  daily_reset_timezone: "UTC"

llm:
  base_url: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4o"
  temperature: 0.1
  timeout_seconds: 60
  context_window_tokens: 0    # 0 = auto-detect, fallback 128K

wiki_data_path: "./wiki-data"

limits:
  agents_md_chars:    4200
  skills_md_chars:    8750
  index_l0_chars:     10500
  index_l1_chars:     10000
  entity_page_chars:  8000
  concept_page_chars: 10000
  log_md_chars:       3500
  conflicts_md_chars: 35000

ingest:
  two_step: true
  max_pages_per_source: 10        # kept for backward compat
  auto_lint_after_ingest: true
  conflict_continue_on_detect: true
  # Large source ingest (Phase 2)
  large_source_threshold_chars: 25000
  chunk_min_chars: 8000
  chunk_target_chars: 16000
  chunk_max_chars: 25000
  max_pages_per_batch: 10
  max_auto_write_pages: 100
  require_review_if_pages_gt: 150

query:
  context_budget_chars: 35000
  max_wiki_pages_in_context: 6
  history_budget_chars: 10000
  allow_code_execution: false

audit:
  confidence_warn_threshold: 0.4
  stale_days_threshold: 90
  run_llm_audit_default: false

auth:
  enabled: false
  username: ""
  password: ""
